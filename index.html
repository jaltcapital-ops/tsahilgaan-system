  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'–Р–ї–і–∞–∞');return d;}

function renderNav(){const un=myUnread();const avail=pages();const byKey={};avail.forEach(p=>byKey[p[0]]=p);const used={};let html='';
  const link=(k,l,ic)=>{const badge=(k==='notifs'&&un>0)?` <span class="badge b-danger" style="font-size:10px">${un}</span>`:'';return `<a class="${CUR===k?'active':''}" onclick="go('${k}')">${ic} ${esc(l)}${badge}</a>`;};
  NAV_GROUPS.forEach(g=>{const items=g.keys.filter(k=>byKey[k]);if(!items.length)return;html+=`<div class="navgrp">${esc(g.n)}</div>`;items.forEach(k=>{used[k]=1;html+=link(k,byKey[k][1],byKey[k][2]);});});
  const rest=avail.filter(p=>!used[p[0]]);if(rest.length){html+='<div class="navgrp">–С—Г—Б–∞–і</div>';rest.forEach(p=>{html+=link(p[0],p[1],p[2]);});}
  document.getElementById('nav').innerHTML=html;
  document.getElementById('title').textContent=(avail.find(p=>p[0]===CUR)||['','–Э“ѓ“ѓ—А'])[1];}

function activeFaultsPanel(){const af=DB.wos.filter(isActiveFault).sort((a,b)=>a.date<b.date?1:-1);

function execWidgets(){const nar=DB.naryad||[];const open=nar.filter(w=>!WO_DONE(w)&&w.status!=='Cancelled').length;
  const closed=nar.filter(WO_DONE).length;const now=new Date();
  const overdue=nar.filter(w=>!WO_DONE(w)&&w.status!=='Cancelled'&&w.plannedFinish&&new Date(w.plannedFinish)<now).length;
  const faulty=new Set((DB.wos||[]).filter(isActiveFault).map(w=>w.equip||w.pd));
  const eqH=(DB.equip&&DB.equip.length)?Math.round((DB.equip.length-faulty.size)/DB.equip.length*100):100;
  const today=iso(new Date());const hr=(DB.attendance||[]).filter(a=>a.date===today&&['day','night','office','holiday','ot','callout'].includes(attKey(a))).length;
  const low=(DB.parts||[]).filter(p=>+p.qty<=+(p.min||0)).length;
  return `<div class="grid kpis" style="grid-template-columns:repeat(6,1fr);margin-bottom:16px">
    ${kpiCard('–Э—Н—Н–ї—В—В—Н–є WO',open,'accent')}${kpiCard('–Ф—Г—Г—Б—Б–∞–љ WO',closed,'ok')}${kpiCard('–•—Г–≥–∞—Ж–∞–∞ —Е—Н—В—Н—А—Б—Н–љ WO',overdue,'danger')}
    ${kpiCard('–Ґ–Њ–љ–Њ–≥ —Н—А“ѓ“ѓ–ї –Љ—Н–љ–і',eqH+'%',eqH>=90?'ok':eqH>=70?'warn':'danger')}${kpiCard('”®–љ”©”©–і”©—А –∞–ґ–Є–ї–ї–∞–ґ –±—Г–є',hr,'teal')}${kpiCard('–Ф—Г—Г—Б—З –±—Г–є —Б—Н–ї–±—Н–≥',low,'warn')}</div>`;}
function faultHeatmap(){const map={};(DB.wos||[]).filter(w=>w.fault&&inRange(w.date)).forEach(w=>{map[w.date]=(map[w.date]||0)+1;});
  const days=[];let d=new Date(RANGE.from),end=new Date(RANGE.to),g=0;while(d<=end&&g<100){const ds=iso(d);days.push({ds,c:map[ds]||0});d.setDate(d.getDate()+1);g++;}
  const max=Math.max(1,...days.map(x=>x.c));const WD=['–Э—П','–Ф–∞','–Ь—П','–Ы—Е','–Я“ѓ','–С–∞','–С—П'];
  return `<div class="glass card" style="margin-bottom:16px"><div class="section-title">рЯФ• –У—Н–Љ—В–ї–Є–є–љ heatmap (”©–і—А”©”©—А)</div>
    <div style="display:flex;flex-wrap:wrap;gap:3px">${days.map(x=>{const a=x.c?(0.25+0.75*x.c/max):0;const we=[0,6].includes(new Date(x.ds).getDay());return `<div title="${x.ds} (${WD[new Date(x.ds).getDay()]}): ${x.c} –≥—Н–Љ—В—Н–ї" style="width:15px;height:15px;border-radius:3px;background:${x.c?'rgba(255,77,79,'+a+')':(we?'rgba(255,180,32,.08)':'rgba(255,255,255,.05)')}"></div>`;}).join('')}</div>
    <div class="muted" style="font-size:11px;margin-top:6px">${RANGE.from} вАУ ${RANGE.to} ¬Ј —Г–ї–∞–∞–љ –≥“ѓ–љ = –≥—Н–Љ—В—Н–ї –Є—Е ¬Ј –љ–Є–є—В ${days.reduce((s,x)=>s+x.c,0)} –≥—Н–Љ—В—Н–ї</div></div>`;}
function todayWorkingPanel(){const today=iso(new Date());const recs=(DB.attendance||[]).filter(a=>a.date===today);
  const day=[],night=[];recs.forEach(a=>{const k=attKey(a);const s=(DB.staff||[]).find(x=>x.id===a.staffId);if(!s)return;
    if(k==='night')night.push(s);else if(['day','office','holiday','ot','callout'].includes(k))day.push(s);});
  const grp=arr=>{const m={};arr.forEach(s=>{(m[s.role]=m[s.role]||[]).push(s.name);});const ks=ROLES.map(r=>r[0]).filter(r=>m[r]);
    return ks.length?ks.map(r=>`<div style="margin:5px 0;font-size:13px"><span class="badge b-muted">${esc(roleLabel(r))}</span> ${m[r].map(esc).join(', ')}</div>`).join(''):'<div class="muted" style="padding:6px">–С“ѓ—А—В–≥—Н–ї –∞–ї–≥–∞ вАФ –¶–∞–≥ –±“ѓ—А—В–≥—Н–ї –і—Н—Н—А –Њ—А—Г—Г–ї–љ–∞ —Г—Г</div>';};
  return `<div class="grid col2" style="margin-bottom:16px">
    <div class="glass card"><div class="section-title">вШАпЄП ”®–љ”©”©–і”©—А ”©–і—А”©”©—А –∞–ґ–Є–ї–ї–∞–ґ –±—Г–є <span class="badge b-ok" style="margin-left:auto">${day.length}</span></div>${grp(day)}</div>
    <div class="glass card"><div class="section-title">рЯМЩ ”®–љ”©”©–і”©—А —И”©–љ”©”©—А –∞–ґ–Є–ї–ї–∞–ґ –±—Г–є <span class="badge b-accent" style="margin-left:auto">${night.length}</span></div>${grp(night)}</div></div>`;}
function rangeLoadPanel(){if(RANGE.from===RANGE.to)return '';const recsAll=DB.attendance||[];const WD=['–Э—П','–Ф–∞','–Ь—П','–Ы—Е','–Я“ѓ','–С–∞','–С—П'];
  const rows=[];let d=new Date(RANGE.from),end=new Date(RANGE.to),g=0;
  while(d<=end&&g<62){const ds=iso(d);const recs=recsAll.filter(a=>a.date===ds);
    const dc=recs.filter(a=>['day','office','holiday','ot','callout'].includes(attKey(a))).length;
    const nc=recs.filter(a=>attKey(a)==='night').length;
    const oc=recs.filter(a=>['rosteroff','shiftl','sick','leaveu','leavep','standby'].includes(attKey(a))).length;
    rows.push({ds,wk:new Date(ds).getDay(),dc,nc,oc});d.setDate(d.getDate()+1);g++;}
  const has=rows.some(r=>r.dc||r.nc||r.oc);

  w.document.close();w.focus();setTimeout(function(){w.print();},700);}

function addNews(e){e.preventDefault();if(!canPostNews()){toast('–Ч”©–≤—Е”©–љ –∞—Е–ї–∞—Е/–∞–і–Љ–Є–љ –љ–Є–є—В—Н–ї–љ—Н');return;}if(!DB.news)DB.news=[];if(!DB.seq.news)DB.seq.news=0;
  DB.news.push({id:++DB.seq.news,title:val('nw_title').trim(),body:val('nw_body').trim(),cat:val('nw_cat'),by:ME?ME.name:'',ts:new Date().toISOString().slice(0,16).replace('T',' ')});
  audit('–®–Є–љ—Н –Љ—Н–і—Н—Н –љ–Є–є—В–ї—Н–≤',val('nw_title').trim());pushNotif('*','рЯУ∞ –®–Є–љ—Н –Љ—Н–і—Н—Н: '+val('nw_title').trim());notify('рЯУ∞ –®–Ш–Э–≠ –Ь–≠–Ф–≠–≠\n'+val('nw_title').trim()+'\n'+(ME?ME.name:''));save();toast('–Э–Є–є—В–ї—Н–≥–і–ї—Н—Н вЬУ');render();}
function delNews(id){if(!canDelete()){toast('–Ч”©–≤—Е”©–љ –∞–і–Љ–Є–љ');return;}if(!confirm('–≠–љ—Н –Љ—Н–і—Н—Н–≥ —Г—Б—В–≥–∞—Е —Г—Г?'))return;DB.news=(DB.news||[]).filter(n=>n.id!==id);save();render();}
function viewNews(){const list=(DB.news||[]).slice().reverse();
  return `${canPostNews()?`<div class="glass card" style="margin-bottom:16px"><div class="section-title">рЯУ∞ –®–Є–љ—Н –Љ—Н–і—Н—Н –љ–Є–є—В–ї—Н—Е <span class="badge b-accent" style="margin-left:auto">–Ч”©–≤—Е”©–љ –∞—Е–ї–∞—Е –Є–љ–ґ–µ–љ–µ—А / –∞–і–Љ–Є–љ</span></div>
    <form onsubmit="addNews(event)"><div class="col3">
      <label class="field" style="grid-column:span 2"><span>–У–∞—А—З–Є–≥ *</span><input id="nw_title" required placeholder="–ґ: –Ґ”©–ї”©–≤–ї”©–≥”©”©—В –Є—Е –Ј–∞—Б–≤–∞—А —Н—Е—Н–ї–ї—Н—Н"></label>
      <label class="field"><span>–Р–љ–≥–Є–ї–∞–ї</span><select id="nw_cat">${optList(NEWS_CAT)}</select></label>
      <label class="field" style="grid-column:span 3"><span>–Р–≥—Г—Г–ї–≥–∞</span><textarea id="nw_body" rows="3"></textarea></label>
    </div><div style="margin-top:10px"><button class="btn">–Э–Є–є—В–ї—Н—Е</button></div></form></div>`:'<div class="note" style="margin-bottom:16px">–≠–љ–і –±–∞–є–≥—Г—Г–ї–ї–∞–≥—Л–љ –Њ–љ—Ж–ї–Њ—Е –Љ—Н–і—Н—Н, –Ј–∞—А–ї–∞–ї —Е–∞—А–∞–≥–і–∞–љ–∞. –Э–Є–є—В–ї—Н—Е —Н—А—Е –Ј”©–≤—Е”©–љ –∞—Е–ї–∞—Е –Є–љ–ґ–µ–љ–µ—А/–∞–і–Љ–Є–љ–і.</div>'}
    <div class="grid col2">${list.map(n=>`<div class="glass card"><div style="display:flex;align-items:start;gap:8px"><div style="flex:1"><span class="badge b-accent" style="font-size:10px">${esc(n.cat||'–Ь—Н–і—Н—Н')}</span> <b style="font-size:15px">${esc(n.title)}</b></div>${canDelete()?delBtn('delNews('+n.id+')'):''}</div>
      ${n.body?'<div style="margin-top:6px;white-space:pre-wrap;font-size:14px">'+esc(n.body)+'</div>':''}
      <div class="muted" style="font-size:11px;margin-top:8px">вЬНпЄП ${esc(n.by)} ¬Ј ${esc(n.ts)}</div></div>`).join('')||'<div class="muted" style="padding:20px">–Ь—Н–і—Н—Н –∞–ї–≥–∞.</div>'}</div>`;}
function newsPanel(){const list=(DB.news||[]).slice().reverse().slice(0,3);if(!list.length)return '';
  return `<div class="glass card" style="margin-bottom:16px"><div class="section-title">рЯУ∞ –®–Є–љ—Н –Љ—Н–і—Н—Н <button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="go('news')">–С“ѓ–≥–і вЖТ</button></div>
    ${list.map(n=>`<div style="padding:7px 0;border-bottom:1px solid var(--line)"><span class="badge b-muted" style="font-size:10px">${esc(n.cat||'')}</span> <b>${esc(n.title)}</b> <span class="muted" style="font-size:11px">¬Ј ${esc(n.ts)}</span></div>`).join('')}</div>`;}
function toast(msg){const t=document.createElement('div');t.className='glass toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ============ Auth / —Н—Е–ї“ѓ“ѓ–ї—Н—Е ============ */
async function doLogin(e){e.preventDefault();
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:val('lu'),password:val('lp')})});
    const d=await r.json();if(!r.ok){toast(d.error||'–Р–ї–і–∞–∞');return;}
    TOKEN=d.token;ME=d.user;localStorage.setItem('tk',TOKEN);await apiLoad();audit('–Э—Н–≤—В—Н—А—Б—Н–љ','');save();startApp();
  }catch(err){toast('–•–Њ–ї–±–Њ–ї—В—Л–љ –∞–ї–і–∞–∞ вАФ —Б–µ—А–≤–µ—А –∞–ґ–Є–ї–ї–∞–ґ –±–∞–є–≥–∞–∞ —Н—Б—Н—Е–Є–є–≥ —И–∞–ї–≥–∞–љ–∞ —Г—Г');}}
function logout(){localStorage.removeItem('tk');TOKEN=null;ME=null;location.reload();}
function startApp(){document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent=ME.name;document.getElementById('whoRole').textContent=roleLabel(ME.role);
  applyTheme();startNotifPoll();
  renderNav();renderPresets();syncDates();render();
  try{const sp=new URLSearchParams(location.search);const eq=sp.get('eq'),pd=sp.get('pd'),wo=sp.get('wo');if(eq){openPassport(eq);}else if(pd){openPdPassport(pd);}else if(wo){go('wo2');setTimeout(()=>{const w=woFind(+wo);if(w)toast('–Э–∞—А—П–і: '+w.no+' ¬Ј '+(wo2Label[w.status]||w.status));},300);}}catch(e){}}
async function init(){if(!TOKEN)return;
  try{ME=await api('/api/me',{headers:authHdr()});await apiLoad();startApp();}
  catch{localStorage.removeItem('tk');TOKEN=null;}}
try{applyTheme();}catch(e){}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(ME)openSearch();}if(e.key==='Escape'){closeSearch();const c=document.getElementById('rCtx');if(c)c.remove();}
  if(CUR==='roster'&&(e.ctrlKey||e.metaKey)){if(e.key==='z'||e.key==='Z'){e.preventDefault();rUndo();}if(e.key==='y'||e.key==='Y'){e.preventDefault();rRedo();}}});
document.addEventListener('mouseup',()=>{if(window._rDrag)rPaintEnd();});
document.addEventListener('click',e=>{const c=document.getElementById('rCtx');if(c&&!c.contains(e.target))c.remove();});
init();
</script>
