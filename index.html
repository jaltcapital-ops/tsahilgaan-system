<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Цахилгааны нэгж · Өдөр тутмын мэдээ</title>
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Цахилгаан">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  :root{--base:#0b1020;--panel:#121a2e;--panel2:#172139;--line:#243049;
    --accent:#2e8bff;--teal:#1ec8c8;--ok:#2fd07a;--warn:#ffb020;--danger:#ff4d4f;--muted:#8ea2c0;--text:#e6edf7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1200px 600px at 80% -10%,rgba(46,139,255,.08),transparent),
               radial-gradient(900px 500px at -10% 20%,rgba(30,200,200,.06),transparent),var(--base);min-height:100vh}
  .glass{background:linear-gradient(180deg,rgba(23,33,57,.9),rgba(18,26,46,.9));border:1px solid var(--line);border-radius:16px}
  .app{display:flex;min-height:100vh}
  aside{width:240px;flex-shrink:0;border-right:1px solid var(--line);background:rgba(18,26,46,.6);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;gap:10px;align-items:center;padding:16px;border-bottom:1px solid var(--line)}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:rgba(46,139,255,.2);color:var(--accent);display:grid;place-items:center;font-size:20px}
  .brand b{font-size:14px} .brand small{color:var(--muted);font-size:11px;display:block}
  nav{flex:1;overflow:auto;padding:8px}
  nav a{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer}
  nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  nav a.active{background:rgba(46,139,255,.15);color:var(--accent)}
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:10;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:12px 20px;border-bottom:1px solid var(--line);background:rgba(18,26,46,.85);backdrop-filter:blur(8px)}
  header h1{font-size:18px;margin:0}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .content{padding:20px}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  input,select,textarea{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:8px 10px;font-size:14px;width:100%;outline:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(6,1fr)}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)} aside{position:fixed;left:-240px;z-index:50;transition:.2s} aside.open{left:0} .menu-btn{display:block!important} .col3,.col2{grid-template-columns:1fr!important}}
  .card{padding:16px;position:relative;overflow:hidden;animation:rise .35s both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .t-accent{color:var(--accent)} .t-ok{color:var(--ok)} .t-warn{color:var(--warn)}
  .t-danger{color:var(--danger)} .t-teal{color:var(--teal)} .t-muted{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;padding:11px;border-bottom:1px solid var(--line)}
  td{padding:10px 11px;border-bottom:1px solid rgba(36,48,73,.5)}
  tr:hover td{background:rgba(255,255,255,.03)}
  .badge{padding:2px 8px;border-radius:7px;font-size:12px;font-weight:500}
  .b-ok{background:rgba(47,208,122,.15);color:var(--ok)} .b-accent{background:rgba(46,139,255,.15);color:var(--accent)}
  .b-warn{background:rgba(255,176,32,.15);color:var(--warn)} .b-danger{background:rgba(255,77,79,.15);color:var(--danger)}
  .b-teal{background:rgba(30,200,200,.15);color:var(--teal)} .b-muted{background:rgba(255,255,255,.06);color:var(--muted)}
  .btn{background:var(--accent);border:0;color:#fff;border-radius:9px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.08)} .btn-sm{padding:7px 12px;font-size:13px}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--text)}
  .del{background:none;border:0;color:var(--danger);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px}
  .del:hover{background:rgba(255,77,79,.12)}
  .ic{background:none;border:0;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 7px;border-radius:6px}
  .ic:hover{background:rgba(255,255,255,.08);color:#fff}
  .field{display:block} .field span{font-size:12px;color:var(--muted)} .field>div,.field input,.field select,.field textarea{margin-top:5px}
  .section-title{font-size:14px;font-weight:600;margin:0 0 12px;display:flex;gap:8px;align-items:center}
  .menu-btn{display:none;background:none;border:0;color:var(--text);font-size:22px;cursor:pointer}
  .hidden{display:none} .login-wrap{display:grid;place-items:center;min-height:100vh;padding:16px} .muted{color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .col3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .col2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .note{background:rgba(46,139,255,.08);border:1px solid rgba(46,139,255,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted)}
  .toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;font-size:14px;z-index:99;animation:rise .3s}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 14px;font-size:13px}
  .addbar{display:flex;gap:8px;margin-top:6px}
  .tot td{font-weight:700;background:rgba(46,139,255,.06)}
  .toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;flex-wrap:wrap}
  .report-body h2{font-size:15px;margin:18px 0 8px} .report-body p{line-height:1.7;color:var(--text)}
  .report-body ul{margin:6px 0 0 0;padding-left:18px} .report-body li{margin:4px 0;line-height:1.6}
  .qrgrid{display:flex;flex-wrap:wrap;gap:8px}
  .qrcell{border:1px solid var(--line);border-radius:8px;padding:6px;width:150px;text-align:center;background:#fff}
  .qrcell img{width:130px;height:130px;display:block;margin:0 auto}
  .qrcell .t{font-weight:700;font-size:12px;font-family:monospace;color:#111;margin-top:2px}
  .qrcell .n{font-size:10px;color:#444;height:24px;overflow:hidden}
  @media print{aside,header,.toolbar,.seg,#qrs{display:none!important} body{background:#fff} .content{padding:0} .glass{background:#fff!important;border:none!important;box-shadow:none!important}}
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <form class="glass card" style="width:340px" onsubmit="doLogin(event)">
    <div class="brand" style="border:0;padding:0 0 18px"><div class="logo">⚡</div>
      <div><b>Цахилгааны нэгж</b><small>Өдөр тутмын мэдээ / тайлангийн систем</small></div></div>
    <label class="field"><span>Нэвтрэх нэр</span><input id="lu" autocomplete="username"></label>
    <div style="height:10px"></div>
    <label class="field"><span>Нууц үг</span><input id="lp" type="password" autocomplete="current-password"></label>
    <div style="height:16px"></div><button class="btn" style="width:100%">Нэвтрэх</button>
    <div class="muted" style="font-size:11px;margin-top:14px;line-height:1.6">Хэрэглэгчээ админ үүсгэнэ. Анхны админ: <b>admin / admin123</b></div>
  </form>
</div>

<div id="app" class="app hidden">
  <aside id="side">
    <div class="brand"><div class="logo">⚡</div><div><b>Цахилгааны нэгж</b><small>НБҮГ-ЗТХ · Тайлан</small></div></div>
    <nav id="nav"></nav>
    <div style="padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center">
      <div style="flex:1;min-width:0"><div id="who" style="font-size:13px">—</div><div class="muted" style="font-size:11px" id="whoRole">—</div></div>
      <button class="btn" style="background:none;color:var(--muted);padding:6px" onclick="logout()" title="Гарах">⏻</button>
    </div>
  </aside>
  <main>
    <header>
      <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <span class="dot"></span><h1 id="title">Нүүр</h1>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div class="seg" id="presets"></div>
        <input type="date" id="dFrom" style="width:auto" onchange="setCustom()"><span class="muted">—</span>
        <input type="date" id="dTo" style="width:auto" onchange="setCustom()">
      </div>
    </header>
    <div class="content" id="view"></div>
  </main>
</div>

<script>
/* ============ Серверийн холболт ============ */
let TOKEN=localStorage.getItem('tk')||null, ME=null, DB=null;
const authHdr=()=>({Authorization:'Bearer '+TOKEN});
const jsonHdr=()=>({...authHdr(),'Content-Type':'application/json'});
async function api(path,opts={}){const r=await fetch(path,opts);if(r.status===401){logout();throw new Error('auth');}
  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Алдаа');return d;}
async function apiLoad(){DB=await api('/api/data',{headers:authHdr()});}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{
  fetch('/api/data',{method:'PUT',headers:jsonHdr(),body:JSON.stringify(DB)})
    .then(r=>{if(!r.ok)r.json().then(e=>toast(e.error||'Хадгалах алдаа гарлаа'));});},250);}
function saveNow(){clearTimeout(saveT);return fetch('/api/data',{method:'PUT',headers:jsonHdr(),body:JSON.stringify(DB)}).then(r=>{if(!r.ok)return r.json().then(e=>{toast(e.error||'Хадгалах алдаа');});}).catch(()=>{});}
function notify(text){fetch('/api/notify',{method:'POST',headers:jsonHdr(),body:JSON.stringify({text})})
  .then(r=>r.json()).then(d=>{if(d&&d.ok)toast('Telegram мэдэгдэл илгээгдлээ ✓');}).catch(()=>{});}

const STATUSES=['Нээлттэй','Хийгдэж буй','Дууссан','Цуцлагдсан'];
const PRIOS=['Бага','Дунд','Өндөр','Эгзэгтэй'];
const ISO_TYPES=['Стандарт','Групп'];
const ISO_STATUS=['Тусгаарласан','Сэргээсэн','Шилжүүлсэн'];
const FAULT_STATES=['Эвдрэлтэй','Засварлаж байгаа','Засварласан'];
const SHIFT_DN=['Өдөр','Шөнө'];
const ROLES=[['ADMIN','Админ'],['CHIEF','Цахилгааны ахлах инженер'],['MASTER','Цахилгааны мастер'],['EE','Цахилгааны инженер'],['ISO_TECH','Цахилгаан тусгаарлалтын техникч'],['ELEC','Цахилгаанчин'],['ELEC_ASST','Туслах цахилгаанчин'],['AUTO_CHIEF','Автоматжуулалтын ахлах инженер'],['AUTO_EE','Автоматжуулалтын инженер'],['AUTO_TECH','Автоматжуулалтын техникч'],['VIEWER','Үзэгч']];
const roleLabel=r=>(ROLES.find(x=>x[0]===r)||[r,r])[1];
const SHIFTS=['А','Б','В','Г'];
// Удирдлагын эрх (Цаг бүртгэл харах)
const MGMT_ROLES=['ADMIN','CHIEF','MASTER','AUTO_CHIEF'];
const canSeeAttend=()=>ME&&MGMT_ROLES.includes(ME.role);
const canEditAttend=()=>ME&&(ME.role==='ADMIN'||ME.role==='CHIEF');
// Цаг бүртгэл — НБҮГ-ийн албан ёсны тэмдэглэгээ (Excel-ийн дагуу)
// k=түлхүүр, lbl=нэр, hrs=цаг шаардах эсэх, suf=кодын дагавар, bucket=нэгтгэлийн ангилал, tone=өнгө
const ATT2=[
 {k:'day',     lbl:'Өдрөөр ажилласан',                 hrs:true, suf:'',   bucket:'day',     tone:'#2fd07a'},
 {k:'night',   lbl:'Шөнөөр ажилласан',                 hrs:true, suf:'/8', bucket:'night',   tone:'#2e8bff'},
 {k:'holiday', lbl:'Баярын цаг',                       hrs:true, suf:'б',  bucket:'holiday', tone:'#a78bfa'},
 {k:'ot',      lbl:'Илүү цаг (сунаж/дуудагдан)',        hrs:true, suf:'с',  bucket:'ot',      tone:'#ffb020'},
 {k:'callout', lbl:'Ээлжийн амралтаас дуудагдсан',      hrs:true, suf:'д',  bucket:'callout', tone:'#ff7a45'},
 {k:'road',    lbl:'Замын цаг',                        hrs:true, suf:'з',  bucket:'road',    tone:'#1ec8c8'},
 {k:'roadh',   lbl:'Замын цаг (баяр)',                 hrs:true, suf:'зб', bucket:'road',    tone:'#1ec8c8'},
 {k:'leavep',  lbl:'Чөлөө (цалинтай)',                 hrs:true, suf:'ч',  bucket:'leave',   tone:'#8ea2c0'},
 {k:'office',  lbl:'Оффис/томилолт/сургалт (ростерт)', hrs:true, suf:'/о', bucket:'office',  tone:'#7c9cff'},
 {k:'officea', lbl:'Оффис/томилолт/сургалт (амралтаар)',hrs:true, suf:'а',  bucket:'office',  tone:'#7c9cff'},
 {k:'standby', lbl:'Сул зогсолт (цалинтай)',           hrs:false,code:'с', bucket:'standby', tone:'#c0c8d8'},
 {k:'standbyu',lbl:'Сул зогсолт (цалингүй)',           hrs:false,code:'сс',bucket:'standby', tone:'#c0c8d8'},
 {k:'leaveu',  lbl:'Чөлөө (цалингүй)',                 hrs:false,code:'ч', bucket:'other',   tone:'#8ea2c0'},
 {k:'sick',    lbl:'Өвчтэй',                           hrs:false,code:'ө', bucket:'sick',    tone:'#ff4d4f'},
 {k:'shiftl',  lbl:'Ээлжийн амралт',                   hrs:false,code:'эа',bucket:'shiftl',  tone:'#8ea2c0'},
 {k:'rosteroff',lbl:'Ростерын амралт',                 hrs:false,code:'а', bucket:'off',     tone:'#5b6680'},
 {k:'maternity',lbl:'Жирэмсний амралт',                hrs:false,code:'жа',bucket:'other',   tone:'#f472b6'},
 {k:'childcare',lbl:'Хүүхэд асрах чөлөө',              hrs:false,code:'ха',bucket:'other',   tone:'#f472b6'},
];
const ATT2BY=Object.fromEntries(ATT2.map(x=>[x.k,x]));
// Хуучин төлвийг шинэ түлхүүр рүү буулгах (нийцэл)
const ATT_OLD={'Өдрийн ээлж':'day','Шөнийн ээлж':'night','Сунаж ажилласан':'ot','Шөнийн ээлжээр сунаж':'ot','Дуудагдан ажилласан':'callout','Амралттай':'rosteroff','Чөлөөтэй':'leaveu','Өвчтэй':'sick','Сургалттай':'office','Томилолттой':'office'};
function attKey(r){if(!r)return null;if(r.type&&ATT2BY[r.type])return r.type;if(r.status&&ATT_OLD[r.status])return ATT_OLD[r.status];return null;}
// Шөнийн цагийн хувь: зун (4-9 сар) 8 цаг, өвөл (10-3 сар) 12 цаг — Excel-ийн дагуу
function nightPortionForDate(date){const mo=+String(date).slice(5,7);return (mo>=4&&mo<=9)?8:12;}
function attCodeOf(r){if(r&&r.code)return r.code;const k=attKey(r);if(!k)return '';const d=ATT2BY[k];if(!d.hrs)return d.code;const h=(r.hours!=null?r.hours:'');
  if(d.k==='day')return String(h);if(d.k==='night')return String(h)+'/'+nightPortionForDate(r.date||'');return String(h)+d.suf;}
function attTone(r){const k=attKey(r);return k?ATT2BY[k].tone:'#5b6680';}
// Эрхийн хяналт: ажил/гэмтлийн статусыг ахлах/мастер/инженер нар өөрчилнө
const WO_EDIT_ROLES=['ADMIN','CHIEF','MASTER','EE','AUTO_CHIEF','AUTO_EE'];
const canEditWoStatus=()=>ME&&WO_EDIT_ROLES.includes(ME.role);
// Наряд / Work Order модуль
const WO2_STATES=['Open','In Progress','Waiting','Completed','Cancelled'];
const wo2Label={'Open':'Нээлттэй','In Progress':'Хийгдэж буй','Waiting':'Хүлээгдэж буй','Completed':'Дууссан','Cancelled':'Цуцалсан'};
const wo2Badge={'Open':'b-accent','In Progress':'b-warn','Waiting':'b-muted','Completed':'b-ok','Cancelled':'b-danger'};
const canCreateWo=()=>ME&&WO_EDIT_ROLES.includes(ME.role);
const canOperateWo=()=>ME&&ME.role!=='VIEWER';
// Тусгаарлалтын төлөвийг зөвхөн Тусгаарлалтын техникч (+Админ) өөрчилнө
const canEditIsoStatus=()=>ME&&(ME.role==='ADMIN'||ME.role==='ISO_TECH');
// Мэдээлэл устгахыг зөвхөн Админ хийнэ
const canDelete=()=>ME&&ME.role==='ADMIN';
const delBtn=(fn)=>canDelete()?`<button class="del" onclick="${fn}" title="Устгах">✕</button>`:'';

/* ============ Туслах ============ */
function downtimeOf(w){if(w.down!=null)return w.down;if(w.start&&w.finish){let m=(new Date(w.finish)-new Date(w.start))/60000;return m>0?Math.round(m):0;}return 0;}
function inRange(date){return date>=RANGE.from&&date<=RANGE.to;}
const isPlanned=t=>['Төлөвлөгөөт','PM'].includes(t);
const isUnplanned=t=>['Төлөвлөгөөт бус','CM','Шуурхай дуудлага'].includes(t);
const isClosed=s=>['Дууссан','Цуцлагдсан'].includes(s);
const faultState=w=>w.fstate||(w.finish?'Засварласан':'Эвдрэлтэй');   // гэмтлийн төлөв
const isActiveFault=w=>w.fault&&faultState(w)!=='Засварласан';        // дашбордад харагдах идэвхтэй гэмтэл
const faultBadge=s=>({'Эвдрэлтэй':'b-danger','Засварлаж байгаа':'b-warn','Засварласан':'b-ok'}[s]||'b-muted');
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const isoPD=i=>i.pd||i.loto||'';
const isoStatus=i=>i.status||'Тусгаарласан';
const isoShift=i=>i.shift||'—';
const num=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
const unitEnergy=(e,f)=>f>0?Math.round(e/f*100)/100:0;

/* ---- Export туслахууд ---- */
function downloadCSV(name,rows){
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=name+'.csv';document.body.appendChild(a);a.click();a.remove();toast('Excel (CSV) татаж байна ✓');}
function printHTML(title,inner){
  const w=window.open('','_blank');if(!w){toast('Popup-ийг зөвшөөрнө үү (PDF)');return;}
  w.document.write('<!doctype html><html lang="mn"><head><meta charset="utf-8"><title>'+title+'</title>'+
   '<style>body{font-family:Segoe UI,sans-serif;padding:26px;color:#111}h1{font-size:20px;margin:0 0 4px}'+
   'h2{font-size:14px;margin:16px 0 6px}.muted{color:#666;font-size:12px}p{line-height:1.65;font-size:13px}'+
   'ul{padding-left:18px}li{margin:4px 0;font-size:13px}'+

/* ============ KPI ============ */
function kpis(){
  const wos=DB.wos.filter(w=>inRange(w.date)),reps=DB.reports.filter(r=>inRange(r.date));
  const isos=DB.isolations.filter(i=>inRange(i.date)),ens=DB.energy.filter(e=>inRange(e.date));
  const faults=wos.filter(w=>w.fault);
  const totalDown=wos.reduce((s,w)=>s+downtimeOf(w),0),faultDown=faults.reduce((s,w)=>s+downtimeOf(w),0);
  const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  const mttr=faults.length?faultDown/faults.length:0;
  const mtbf=faults.length?(opMin-faultDown)/faults.length/60:0;
  const avail=opMin?Math.max(0,(opMin-faultDown)/opMin*100):100;
  const workHours=reps.reduce((s,r)=>s+(r.head||0)*12,0);
  const done=wos.filter(w=>isClosed(w.status)).length;
  const totFeed=ens.reduce((s,e)=>s+(+e.feed||0),0),totEn=ens.reduce((s,e)=>s+(+e.energy||0),0);
  const byStatus={};STATUSES.forEach(s=>byStatus[s]=wos.filter(w=>w.status===s).length);
  return {total:wos.length,done,planned:wos.filter(w=>isPlanned(w.type)).length,
    unplanned:wos.filter(w=>isUnplanned(w.type)).length,faults:faults.length,activeFaults:wos.filter(isActiveFault).length,byStatus,
    emergency:wos.filter(w=>w.type==='Шуурхай дуудлага').length,
    open:wos.filter(w=>!isClosed(w.status)).length,critical:wos.filter(w=>w.prio==='Эгзэгтэй'&&!isClosed(w.status)).length,
    isoStd:isos.filter(i=>i.type==='Стандарт').length,isoGrp:isos.filter(i=>i.type==='Групп').length,
    down:totalDown,mttr:Math.round(mttr),mtbf:Math.round(mtbf),avail:Math.round(avail*100)/100,workHours,
    completion:wos.length?Math.round(done/wos.length*100):0,unitEnergy:unitEnergy(totEn,totFeed),totFeed,totEn};
}
function workTypeCounts(){const wos=DB.wos.filter(w=>inRange(w.date));const m={};DB.types.forEach(t=>m[t]=0);
  wos.forEach(w=>{m[w.type]=(m[w.type]||0)+1;});return Object.entries(m).filter(([t,c])=>c>0).sort((a,b)=>b[1]-a[1]);}
function trend(){const map={};DB.wos.filter(w=>inRange(w.date)).forEach(w=>{map[w.date]=map[w.date]||{date:w.date,works:0,faults:0,down:0};
  map[w.date].works++;if(w.fault)map[w.date].faults++;map[w.date].down+=downtimeOf(w);});
  return Object.values(map).sort((a,b)=>a.date<b.date?-1:1);}
function energyTrend(){const map={};DB.energy.filter(e=>inRange(e.date)).forEach(e=>{map[e.date]=map[e.date]||{date:e.date,feed:0,energy:0};
  map[e.date].feed+=(+e.feed||0);map[e.date].energy+=(+e.energy||0);});
  return Object.values(map).map(x=>({date:x.date,unit:unitEnergy(x.energy,x.feed)})).sort((a,b)=>a.date<b.date?-1:1);}
function equipReliability(){const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  return DB.equip.map(e=>{const ws=DB.wos.filter(w=>w.equip===e.tag&&inRange(w.date));const faults=ws.filter(w=>w.fault);
    const down=faults.reduce((s,w)=>s+downtimeOf(w),0),stops=faults.length;
    return {tag:e.tag,name:e.name,crit:e.crit,stops,down,mttr:stops?Math.round(down/stops):0,
      mtbf:stops?Math.round((opMin-down)/stops/60):'—',works:ws.length};
  }).sort((a,b)=>b.stops-a.stops||b.down-a.down);}
function topEquip(){const m={};DB.wos.filter(w=>inRange(w.date)&&isActiveFault(w)).forEach(w=>{m[w.equip]=(m[w.equip]||0)+1;});
  return Object.entries(m).map(([tag,c])=>({tag,faults:c})).sort((a,b)=>b.faults-a.faults).slice(0,10);}

function presetRange(p){const now=new Date();const to=iso(now);
  if(p==='today')return{from:to,to};
  if(p==='week'){const f=new Date(now);f.setDate(f.getDate()-6);return{from:iso(f),to};}
  if(p==='year')return{from:now.getFullYear()+'-01-01',to};
  return{from:to.slice(0,8)+'01',to};}

function importParts(input){const f=input.files&&input.files[0];if(!f)return;
  if(typeof XLSX==='undefined'){toast('Excel сан ачаалагдаагүй — интернэт шалгана уу');return;}
  const rd=new FileReader();
  rd.onload=ev=>{try{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(!DB.parts)DB.parts=[];if(!DB.seq.part)DB.seq.part=0;let added=0;
    arr.forEach((row,i)=>{if(i===0)return;
      let code='',name='',unit='ш',qty=0,min=0;
      if(row.length>=4){code=String(row[0]||'').trim();name=String(row[1]||'').trim();unit=String(row[2]||'ш').trim()||'ш';qty=parseFloat(row[3])||0;min=parseFloat(row[4])||0;}
      else{name=String(row[0]||'').trim();qty=parseFloat(row[1])||0;}
      if(!name)return;
      DB.parts.push({id:++DB.seq.part,code,name,unit,qty,min});added++;});
    save();toast(added+' сэлбэг импортлогдлоо ✓');render();
  }catch(err){toast('Импортын алдаа — файлын форматыг шалгана уу');}};
  rd.readAsBinaryString(f);input.value='';}

function compressImg(file,cb){const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const max=900;let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.55));};img.src=ev.target.result;};r.readAsDataURL(file);}

function staffRoleFrom(t){t=(t||'').toLowerCase();
  if(t.includes('автомат')&&t.includes('ахлах'))return 'AUTO_CHIEF';
  if(t.includes('автомат')&&t.includes('инженер'))return 'AUTO_EE';
  if(t.includes('автомат'))return 'AUTO_TECH';
  if(t.includes('тусгаарлал'))return 'ISO_TECH';
  if(t.includes('ахлах'))return 'CHIEF';
  if(t.includes('мастер'))return 'MASTER';
  if(t.includes('туслах'))return 'ELEC_ASST';
  if(t.includes('инженер'))return 'EE';
  if(t.includes('цахилгаанчин'))return 'ELEC';
  const m=ROLES.find(r=>r[1].toLowerCase()===t);return m?m[0]:'EE';}
function importStaff(input){const f=input.files&&input.files[0];if(!f)return;
  if(typeof XLSX==='undefined'){toast('Excel сан ачаалагдаагүй');return;}
  ensureStaff();const rd=new FileReader();
  rd.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];
    const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});let added=0;
    arr.forEach((row,i)=>{if(i===0)return;const name=String(row[0]||'').trim();if(!name)return;
      let sh=String(row[2]||'').trim().toUpperCase();if(!SHIFTS.includes(sh))sh='А';
      DB.staff.push({id:++DB.seq.staff,name,role:staffRoleFrom(String(row[1]||'')),shift:sh,phone:String(row[3]||'').trim()});added++;});
    save();toast(added+' ажилтан импортлогдлоо ✓');render();
  }catch(err){toast('Импорт алдаа: '+err.message);}};
  rd.readAsBinaryString(f);input.value='';}
/* ---- Цаг бүртгэл (KPI-тай холбогдохгүй) ---- */
function attMonth(){return window._attMonth||iso(new Date()).slice(0,7);}
function setAttMonth(delta){const[y,m]=attMonth().split('-').map(Number);const d=new Date(y,m-1+delta,1);window._attMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();}
function monthDays(m){const[y,mo]=m.split('-').map(Number);return new Date(y,mo,0).getDate();}
function attRec(sid,date){return (DB.attendance||[]).find(a=>a.staffId===sid&&a.date===date);}
function upsertAtt(sid,date,type,hours,note){if(!DB.attendance)DB.attendance=[];if(!DB.seq.att)DB.seq.att=0;
  const d=ATT2BY[type];const code=d?(!d.hrs?d.code:(d.k==='day'?String(hours):d.k==='night'?String(hours)+'/'+nightPortionForDate(date):String(hours)+d.suf)):'';
  const ex=attRec(sid,date);
  if(ex){ex.type=type;ex.hours=hours;ex.code=code;if(note!==undefined)ex.note=note;delete ex.status;delete ex.ot;delete ex.nh;delete ex.callout;}
  else DB.attendance.push({id:++DB.seq.att,staffId:sid,date,type,hours,code,note:note||''});}
function editAttCell(sid,date){if(!canEditAttend()){toast('Зөвхөн админ/ахлах засна');return;}
  ensureStaff();const ex=attRec(sid,date);const curKey=attKey(ex)||'day';const s=(DB.staff||[]).find(x=>x.id===sid)||{};
  const opts=ATT2.map(x=>`<option value="${x.k}" ${x.k===curKey?'selected':''}>${esc(x.lbl)}</option>`).join('');
  const o=document.createElement('div');o.id='attModal';o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:260;display:grid;place-items:center;padding:16px';
  o.innerHTML=`<div class="glass card" style="max-width:420px;width:100%">
    <div class="section-title">🕒 ${esc(s.name||'')} · ${date}</div>
    <label class="field"><span>Төлөв сонгох</span><select id="ec_type" onchange="attToggleHours()">${opts}</select></label>
    <label class="field" id="ec_hwrap" style="margin-top:8px"><span>Ажилласан цаг</span><input id="ec_hours" type="number" step="0.5" oninput="attToggleHours()" value="${ex&&ex.hours!=null?ex.hours:12}"></label>
    <label class="field" style="margin-top:8px"><span>→ Хэдэн өдөр дараалан бичих (Excel шиг чирэх)</span><input id="ec_fill" type="number" min="1" value="1"></label>
    <label class="field" style="margin-top:8px"><span>Тэмдэглэл</span><input id="ec_note" value="${ex?esc(ex.note||''):''}"></label>
    <div style="margin-top:10px;font-size:12px" class="muted">Excel код: <b id="ec_codeprev" class="t-accent"></b></div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="saveAttCell(${sid},'${date}')">Хадгалах</button>
      ${ex?`<button class="btn btn-ghost" onclick="clearAttCell(${sid},'${date}')">Арилгах</button>`:''}
      <button class="btn btn-ghost" onclick="document.getElementById('attModal').remove()">Болих</button></div></div>`;
  document.body.appendChild(o);attToggleHours();}
function attToggleHours(){const t=document.getElementById('ec_type');if(!t)return;const d=ATT2BY[t.value];const w=document.getElementById('ec_hwrap');
  if(w)w.style.display=d&&d.hrs?'block':'none';const h=document.getElementById('ec_hours');const cp=document.getElementById('ec_codeprev');
  if(cp)cp.textContent=d?(!d.hrs?d.code:((h?h.value:'')+(d.k==='day'?'':d.suf))):'';}
function saveAttCell(sid,date){const d=ATT2BY[document.getElementById('ec_type').value];if(!d)return;
  const hours=d.hrs?(parseFloat(document.getElementById('ec_hours').value)||0):0;
  const note=(document.getElementById('ec_note')||{value:''}).value;
  const fill=Math.max(1,parseInt((document.getElementById('ec_fill')||{value:'1'}).value,10)||1);
  const base=new Date(date);for(let i=0;i<fill;i++){const dt=new Date(base);dt.setDate(base.getDate()+i);upsertAtt(sid,iso(dt),d.k,hours,note);}
  const md=document.getElementById('attModal');if(md)md.remove();save();toast(fill>1?fill+' өдөр бичигдлээ ✓':'Хадгалагдлаа ✓');render();}
function clearAttCell(sid,date){DB.attendance=(DB.attendance||[]).filter(a=>!(a.staffId===sid&&a.date===date));const md=document.getElementById('attModal');if(md)md.remove();save();render();}
function autofillRotation(){if(!canEditAttend())return;ensureStaff();
  const names=DB.staff.map((s,i)=>(i+1)+'='+s.name).join('\n');
  const sa=prompt('Ажилтан сонгоно уу:\n'+names);if(sa===null)return;const si=parseInt(sa,10)-1;if(!DB.staff[si]){toast('Буруу');return;}
  const sid=DB.staff[si].id;
  const start=prompt('14/14 эргэлт эхлэх огноо (YYYY-MM-DD):',attMonth()+'-01');if(!start)return;
  const order=prompt('Эхний 7 хоног аль ээлж? 1=Өдрөөр түрүүлж, 2=Шөнөөр түрүүлж','1');if(order===null)return;
  const nightFirst=order.trim()==='2';const base=new Date(start);if(isNaN(base)){toast('Огноо буруу');return;}
  for(let d=0;d<14;d++){const dt=new Date(base);dt.setDate(base.getDate()+d);const ds=iso(dt);
    let k;if(d<7)k=nightFirst?'night':'day';else k=nightFirst?'day':'night';upsertAtt(sid,ds,k,12,'');}
  for(let d=14;d<28;d++){const dt=new Date(base);dt.setDate(base.getDate()+d);upsertAtt(sid,iso(dt),'rosteroff',0,'');}
  save();toast('14/14 хуваарь (7 өдрөөр+7 шөнөөр+14 амралт) бөглөгдлөө ✓');render();}

function attMonthSummary(m){const map={};(DB.staff||[]).forEach(s=>map[s.id]={base:0,ot:0,night:0,holiday:0,road:0,callout:0,office:0,leaveH:0,standby:0,sick:0,shiftl:0,off:0,other:0,worked:0,dayD:0,nightD:0});
  (DB.attendance||[]).filter(a=>a.date&&a.date.slice(0,7)===m).forEach(a=>{const t=map[a.staffId];if(!t)return;const k=attKey(a);if(!k)return;const h=+a.hours||0;
    if(k==='day'){t.base+=Math.min(h,8);t.ot+=Math.max(h-8,0);t.worked+=h;t.dayD++;}
    else if(k==='night'){t.base+=Math.min(h,8);t.ot+=Math.max(h-8,0);t.night+=Math.min(h,nightPortionForDate(a.date));t.worked+=h;t.nightD++;}
    else if(k==='holiday'){t.holiday+=h;t.worked+=h;}
    else if(k==='ot'){t.ot+=h;t.worked+=h;}
    else if(k==='callout'){t.callout+=h;t.worked+=h;}
    else if(k==='road'||k==='roadh'){t.road+=h;}
    else if(k==='office'||k==='officea'){t.base+=Math.min(h,8);t.ot+=Math.max(h-8,0);t.office+=h;t.worked+=h;}
    else if(k==='leavep'){t.leaveH+=h;}
    else if(k==='standby'||k==='standbyu'){t.standby++;}
    else if(k==='sick'){t.sick++;}
    else if(k==='shiftl'){t.shiftl++;}
    else if(k==='rosteroff'){t.off++;}
    else t.other++;});
  return map;}

  (DB.naryad||[]).filter(w=>w.status==='Completed').forEach(w=>{const mins=woWorked(w);

        <label class="field"><span>Дуусах (товлосон)</span><input type="datetime-local" id="wo_pfinish"></label>
        <div class="field" style="grid-column:span 3"><span>Гүйцэтгэх ажилтан (нэг буюу хэд сонгоно · ахлах инженер хамаарахгүй)</span>
          <div style="max-height:140px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:4px">${staffChecks||'<span class="muted">Ажилтан алга</span>'}</div></div>
      </div><div style="margin-top:10px">${dataListEquip()}${dataListPd()}<button class="btn">Наряд үүсгэх</button></div></form></div>`:''}
    <div class="glass card" style="padding:0;overflow:auto;margin-bottom:16px"><div class="section-title" style="padding:12px 14px 0">🧾 Нарядууд</div>
      <table><thead><tr><th>№</th><th>Ажил</th><th>Гүйцэтгэгч</th><th>Товлосон</th><th>Хугацаа</th><th>Төлөв</th><th>Үйлдэл</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" class="muted" style="text-align:center;padding:18px">Наряд алга — дээрээс үүсгэнэ үү.</td></tr>'}</tbody></table></div>
    <div class="glass card" style="padding:0;overflow:auto"><div class="section-title" style="padding:12px 14px 0">🏆 KPI — ажилтны гүйцэтгэл <span class="muted" style="font-weight:400;font-size:12px">(хугацаандаа 50% · ажлын тоо 30% · хурд 20%)</span></div>
      <table><thead><tr><th>Ажилтан</th><th>Дуусгасан</th><th>Хугацаандаа %</th><th>Дундаж мин</th><th>Нийт мин</th><th>KPI оноо</th></tr></thead>
      <tbody>${kArr.map((t,i)=>`<tr><td>${i===0?'🏆 ':''}${esc(t.name)}</td><td style="text-align:center">${t.done}</td><td style="text-align:center" class="${t.onPct>=80?'t-ok':t.onPct>=50?'t-warn':'t-danger'}">${t.onPct}%</td><td style="text-align:center">${t.avg}</td><td style="text-align:center">${t.minutes}</td><td style="text-align:center"><span class="badge ${t.score>=80?'b-ok':t.score>=50?'b-warn':'b-danger'}">${t.score}</span></td></tr>`).join('')||'<tr><td colspan="6" class="muted" style="text-align:center;padding:18px">Дууссан наряд алга — KPI бодогдоогүй.</td></tr>'}</tbody></table></div>`;}
function toast(msg){const t=document.createElement('div');t.className='glass toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ============ Auth / эхлүүлэх ============ */
async function doLogin(e){e.preventDefault();
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:val('lu'),password:val('lp')})});
    const d=await r.json();if(!r.ok){toast(d.error||'Алдаа');return;}
    TOKEN=d.token;ME=d.user;localStorage.setItem('tk',TOKEN);await apiLoad();startApp();
  }catch(err){toast('Холболтын алдаа — сервер ажиллаж байгаа эсэхийг шалгана уу');}}
function logout(){localStorage.removeItem('tk');TOKEN=null;ME=null;location.reload();}
function startApp(){document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent=ME.name;document.getElementById('whoRole').textContent=roleLabel(ME.role);
  renderNav();renderPresets();syncDates();render();
  try{const sp=new URLSearchParams(location.search);const eq=sp.get('eq'),pd=sp.get('pd');if(eq){openPassport(eq);}else if(pd){openPdPassport(pd);}}catch(e){}}
async function init(){if(!TOKEN)return;
  try{ME=await api('/api/me',{headers:authHdr()});await apiLoad();startApp();}
  catch{localStorage.removeItem('tk');TOKEN=null;}}
init();
</script>
</body>
</html>
