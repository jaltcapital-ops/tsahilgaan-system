<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Цахилгаан">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  :root{--base:#0b1020;--panel:#121a2e;--panel2:#172139;--line:#243049;
    --accent:#2e8bff;--teal:#1ec8c8;--ok:#2fd07a;--warn:#ffb020;--danger:#ff4d4f;--muted:#8ea2c0;--text:#e6edf7;}
  body.light{--base:#f4f6fb;--panel:#ffffff;--panel2:#eef2f9;--line:#d5dee9;--muted:#566683;--text:#16203a;}
  body.light .glass{background:linear-gradient(180deg,#ffffff,#f6f9fc)}
  body.light aside{background:#eef2f9}
  body.light header{background:rgba(255,255,255,.92)}
  body.light nav a:hover{background:rgba(0,0,0,.05);color:#111}
  body.light .tot{background:rgba(0,0,0,.04)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1200px 600px at 80% -10%,rgba(46,139,255,.08),transparent),
               radial-gradient(900px 500px at -10% 20%,rgba(30,200,200,.06),transparent),var(--base);min-height:100vh}
  .glass{background:linear-gradient(180deg,rgba(23,33,57,.9),rgba(18,26,46,.9));border:1px solid var(--line);border-radius:16px}
  .app{display:flex;min-height:100vh}
  aside{width:240px;flex-shrink:0;border-right:1px solid var(--line);background:rgba(18,26,46,.6);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;gap:10px;align-items:center;padding:16px;border-bottom:1px solid var(--line)}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:rgba(46,139,255,.2);color:var(--accent);display:grid;place-items:center;font-size:20px}
  .brand b{font-size:14px} .brand small{color:var(--muted);font-size:11px;display:block}
  nav{flex:1;overflow:auto;padding:8px}
  nav a{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer}
  nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  nav a.active{background:rgba(46,139,255,.15);color:var(--accent)}
  nav .navgrp{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:14px 12px 4px;opacity:.65;font-weight:600}
  nav .navgrp:first-child{padding-top:4px}
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:10;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:12px 20px;border-bottom:1px solid var(--line);background:rgba(18,26,46,.85);backdrop-filter:blur(8px)}
  header h1{font-size:18px;margin:0}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .content{padding:20px}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  input,select,textarea{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:8px 10px;font-size:14px;width:100%;outline:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(6,1fr)}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)} aside{position:fixed;left:-240px;z-index:50;transition:.2s} aside.open{left:0} .menu-btn{display:block!important} .col3,.col2{grid-template-columns:1fr!important}}
  .card{padding:16px;position:relative;overflow:hidden;animation:rise .35s both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .t-accent{color:var(--accent)} .t-ok{color:var(--ok)} .t-warn{color:var(--warn)}
  .t-danger{color:var(--danger)} .t-teal{color:var(--teal)} .t-muted{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;padding:11px;border-bottom:1px solid var(--line)}
  td{padding:10px 11px;border-bottom:1px solid rgba(36,48,73,.5)}
  tr:hover td{background:rgba(255,255,255,.03)}
  .badge{padding:2px 8px;border-radius:7px;font-size:12px;font-weight:500}
  .b-ok{background:rgba(47,208,122,.15);color:var(--ok)} .b-accent{background:rgba(46,139,255,.15);color:var(--accent)}
  .b-warn{background:rgba(255,176,32,.15);color:var(--warn)} .b-danger{background:rgba(255,77,79,.15);color:var(--danger)}
  .b-teal{background:rgba(30,200,200,.15);color:var(--teal)} .b-muted{background:rgba(255,255,255,.06);color:var(--muted)}
  .btn{background:var(--accent);border:0;color:#fff;border-radius:9px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.08)} .btn-sm{padding:7px 12px;font-size:13px}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--text)}
  .del{background:none;border:0;color:var(--danger);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px}
  .del:hover{background:rgba(255,77,79,.12)}
  .ic{background:none;border:0;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 7px;border-radius:6px}
  .ic:hover{background:rgba(255,255,255,.08);color:#fff}
  .field{display:block} .field span{font-size:12px;color:var(--muted)} .field>div,.field input,.field select,.field textarea{margin-top:5px}
  .section-title{font-size:14px;font-weight:600;margin:0 0 12px;display:flex;gap:8px;align-items:center}
  .menu-btn{display:none;background:none;border:0;color:var(--text);font-size:22px;cursor:pointer}
  .hidden{display:none!important} .login-wrap{display:grid;place-items:center;min-height:100vh;padding:16px} .muted{color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .col3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .col2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .note{background:rgba(46,139,255,.08);border:1px solid rgba(46,139,255,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted)}
  .toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;font-size:14px;z-index:99;animation:rise .3s}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 14px;font-size:13px}
  .addbar{display:flex;gap:8px;margin-top:6px}
  .tot td{font-weight:700;background:rgba(46,139,255,.06)}
  .toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;flex-wrap:wrap}
  .report-body h2{font-size:15px;margin:18px 0 8px} .report-body p{line-height:1.7;color:var(--text)}
  .report-body ul{margin:6px 0 0 0;padding-left:18px} .report-body li{margin:4px 0;line-height:1.6}
  .qrgrid{display:flex;flex-wrap:wrap;gap:8px}
  .qrcell{border:1px solid var(--line);border-radius:8px;padding:6px;width:150px;text-align:center;background:#fff}
  .qrcell img{width:130px;height:130px;display:block;margin:0 auto}
  .qrcell .t{font-weight:700;font-size:12px;font-family:monospace;color:#111;margin-top:2px}
  .qrcell .n{font-size:10px;color:#444;height:24px;overflow:hidden}
  @media print{aside,header,.toolbar,.seg,#qrs,.noprint{display:none!important} body{background:#fff;color:#000} .content{padding:0} .glass{background:#fff!important;border:none!important;box-shadow:none!important} #woSheet{color:#000} #woSheet td{color:#000}}
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <form class="glass card" style="width:340px" onsubmit="doLogin(event)">
    <div class="brand" style="border:0;padding:0 0 18px"><div class="logo">⚡</div>
      <div><b>Цахилгааны нэгж</b><small>Өдөр тутмын мэдээ / тайлангийн систем</small></div></div>
    <label class="field"><span>Нэвтрэх нэр</span><input id="lu" autocomplete="username"></label>
    <div style="height:10px"></div>
    <label class="field"><span>Нууц үг</span><input id="lp" type="password" autocomplete="current-password"></label>
    <div style="height:16px"></div><button class="btn" style="width:100%">Нэвтрэх</button>
    <div class="muted" style="font-size:11px;margin-top:14px;line-height:1.6">Хэрэглэгчээ админ үүсгэнэ. Анхны админ: <b>admin / admin123</b></div>
  </form>
</div>

<div id="app" class="app hidden">
  <aside id="side">
    <div class="brand"><div class="logo">⚡</div><div><b>Цахилгааны нэгж</b><small>НБҮГ-ЗТХ · Тайлан</small></div></div>
    <nav id="nav"></nav>
    <div style="padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center">
      <div style="flex:1;min-width:0"><div id="who" style="font-size:13px">—</div><div class="muted" style="font-size:11px" id="whoRole">—</div></div>
      <button class="btn" style="background:none;color:var(--muted);padding:6px" onclick="logout()" title="Гарах">⏻</button>
    </div>
  </aside>
  <main>
    <header>
      <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <span class="dot"></span><h1 id="title">Нүүр</h1>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-sm btn-ghost" onclick="openSearch()" title="Хайлт (Ctrl+K)">🔍 Хайх</button>
        <button class="btn btn-sm btn-ghost" id="themeBtn" onclick="toggleTheme()" title="Theme">🌙</button>
        <div class="seg" id="presets"></div>
        <input type="date" id="dFrom" style="width:auto" onchange="setCustom()"><span class="muted">—</span>
        <input type="date" id="dTo" style="width:auto" onchange="setCustom()">
      </div>
    </header>
    <div class="content" id="view"></div>
  </main>
</div>

<script>
/* ============ Серверийн холболт ============ */
let TOKEN=localStorage.getItem('tk')||null, ME=null, DB=null;
const authHdr=()=>({Authorization:'Bearer '+TOKEN});
const jsonHdr=()=>({...authHdr(),'Content-Type':'application/json'});
async function api(path,opts={}){const r=await fetch(path,opts);if(r.status===401){logout();throw new Error('auth');}
  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Алдаа');return d;}
async function apiLoad(){DB=await api('/api/data',{headers:authHdr()});}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{
  fetch('/api/data',{method:'PUT',headers:jsonHdr(),body:JSON.stringify(DB)})
    .then(r=>{if(!r.ok)r.json().then(e=>toast(e.error||'Хадгалах алдаа гарлаа'));});},250);}
function saveNow(){clearTimeout(saveT);return fetch('/api/data',{method:'PUT',headers:jsonHdr(),body:JSON.stringify(DB)}).then(r=>{if(!r.ok)return r.json().then(e=>{toast(e.error||'Хадгалах алдаа');});}).catch(()=>{});}
function notify(text){fetch('/api/notify',{method:'POST',headers:jsonHdr(),body:JSON.stringify({text})})
  .then(r=>r.json()).then(d=>{if(d&&d.ok)toast('Telegram мэдэгдэл илгээгдлээ ✓');}).catch(()=>{});}
function audit(action,detail){try{if(!DB)return;if(!DB.audit)DB.audit=[];if(!DB.seq)DB.seq={};if(!DB.seq.audit)DB.seq.audit=0;
  DB.audit.push({id:++DB.seq.audit,ts:new Date().toISOString().slice(0,19).replace('T',' '),user:ME?ME.name:'',role:ME?ME.role:'',action:action,detail:detail||'',ua:(navigator.userAgent||'').slice(0,80)});
  if(DB.audit.length>1500)DB.audit=DB.audit.slice(-1500);}catch(e){}}
function pushNotif(toName,text,link){try{if(!DB)return;if(!DB.notifs)DB.notifs=[];if(!DB.seq)DB.seq={};if(!DB.seq.notif)DB.seq.notif=0;
  DB.notifs.push({id:++DB.seq.notif,toName:toName||'*',text:text||'',link:link||'',ts:new Date().toISOString().slice(0,16).replace('T',' '),read:false});
  if(DB.notifs.length>800)DB.notifs=DB.notifs.slice(-800);}catch(e){}}
function myUnread(){if(!ME||!DB||!DB.notifs)return 0;return DB.notifs.filter(n=>(n.toName===ME.name||n.toName==='*')&&!n.read).length;}

const STATUSES=['Нээлттэй','Хийгдэж буй','Дууссан','Цуцлагдсан'];
const PRIOS=['Бага','Дунд','Өндөр','Эгзэгтэй'];
const ISO_TYPES=['Стандарт','Групп'];
const ISO_STATUS=['Тусгаарласан','Сэргээсэн','Шилжүүлсэн'];
const FAULT_STATES=['Эвдрэлтэй','Засварлаж байгаа','Засварласан'];
const SHIFT_DN=['Өдөр','Шөнө'];
const ROLES=[['ADMIN','Админ'],['CHIEF','Цахилгааны ахлах инженер'],['MASTER','Цахилгааны мастер'],['EE','Цахилгааны инженер'],['ISO_TECH','Цахилгаан тусгаарлалтын техникч'],['ELEC','Цахилгаанчин'],['ELEC_ASST','Туслах цахилгаанчин'],['AUTO_CHIEF','Автоматжуулалтын ахлах инженер'],['AUTO_EE','Автоматжуулалтын инженер'],['AUTO_TECH','Автоматжуулалтын техникч'],['VIEWER','Үзэгч']];
const roleLabel=r=>(ROLES.find(x=>x[0]===r)||[r,r])[1];
const SHIFTS=['А','Б','В','Г'];
const HOLIDAYS={'2026-01-01':'Шинэ жил','2026-02-18':'Цагаан сар — шинийн 1','2026-02-19':'Цагаан сар — шинийн 2','2026-02-20':'Цагаан сар — шинийн 3','2026-03-08':'Эмэгтэйчүүдийн баяр','2026-05-31':'Бурхан багшийн Их дүйчин','2026-06-01':'Хүүхдийн баяр','2026-07-10':'Наадам','2026-07-11':'Наадам','2026-07-12':'Наадам','2026-07-13':'Наадам','2026-07-14':'Наадам','2026-07-15':'Наадам','2026-11-10':'Их Эзэн Чингис хааны өдөр','2026-11-26':'Улс тунхагласан өдөр','2026-12-29':'Тусгаар тогтнолын өдөр'};
const isHoliday=d=>!!HOLIDAYS[d];
/* ===== Эрхийн матриц (RBAC) ===== */
const PERMS=[
 ['dash_view','Dashboard харах'],['wo_view','Work Order харах'],['wo_create','Work Order үүсгэх'],
 ['wo_edit','Work Order засах / төлөв'],['wo_close','Work Order хаах / батлах'],['wo_delete','Work Order устгах'],
 ['fault_create','Гэмтэл бүртгэх'],['energy_create','Эрчим хүч бүртгэх'],['iso_create','Тусгаарлалт / LOTO хийх'],
 ['iso_view','Тусгаарлалт бүртгэх'],['parts_edit','Сэлбэг засах'],['attend_view','Цаг бүртгэл харах'],['attend_edit','Цаг бүртгэл засах'],
 ['report_view','Тайлан харах'],['news_post','Шинэ мэдээ нийтлэх'],['settings','Тохиргоо / Лавлах'],['user_manage','Хэрэглэгч удирдах']
];
const DEFAULT_PERMS={
 ADMIN:'*',
 CHIEF:['dash_view','wo_view','wo_create','wo_edit','wo_close','fault_create','energy_create','iso_create','iso_view','parts_edit','attend_view','attend_edit','report_view','news_post','settings'],
 MASTER:['dash_view','wo_view','wo_create','wo_edit','wo_close','fault_create','energy_create','iso_create','iso_view','parts_edit','attend_view','report_view','news_post','settings'],
 EE:['dash_view','wo_view','wo_edit','fault_create','energy_create','parts_edit','report_view','settings'],
 AUTO_CHIEF:['dash_view','wo_view','wo_create','wo_edit','wo_close','fault_create','energy_create','iso_create','iso_view','parts_edit','attend_view','report_view','news_post','settings'],
 AUTO_EE:['dash_view','wo_view','wo_create','wo_edit','fault_create','energy_create','parts_edit','report_view','settings'],
 AUTO_TECH:['dash_view','wo_view','fault_create','report_view'],
 ISO_TECH:['dash_view','wo_view','fault_create','iso_create','iso_view','report_view'],
 ELEC:['dash_view','wo_view','fault_create','report_view'],
 ELEC_ASST:['dash_view','wo_view','fault_create','report_view'],
 VIEWER:['dash_view','wo_view','report_view']
};
function rolePerms(role){const p=(typeof DB!=='undefined'&&DB&&DB.perms&&DB.perms[role]);if(p)return p;const d=DEFAULT_PERMS[role];return d==='*'?'*':(d||[]);}
function can(perm){if(!ME)return false;if(ME.role==='ADMIN')return true;const rp=rolePerms(ME.role);return rp==='*'?true:rp.includes(perm);}
const canSeeAttend=()=>can('attend_view');
const canEditAttend=()=>can('attend_edit');
// Цаг бүртгэл — НБҮГ-ийн албан ёсны тэмдэглэгээ (Excel-ийн дагуу)
// k=түлхүүр, lbl=нэр, hrs=цаг шаардах эсэх, suf=кодын дагавар, bucket=нэгтгэлийн ангилал, tone=өнгө
const ATT2=[
 {k:'day',     lbl:'Өдрөөр ажилласан',                 hrs:true, suf:'',   bucket:'day',     tone:'#2fd07a'},
 {k:'night',   lbl:'Шөнөөр ажилласан',                 hrs:true, suf:'/8', bucket:'night',   tone:'#2e8bff'},
 {k:'holiday', lbl:'Баярын цаг',                       hrs:true, suf:'б',  bucket:'holiday', tone:'#a78bfa'},
 {k:'ot',      lbl:'Илүү цаг (сунаж/дуудагдан)',        hrs:true, suf:'с',  bucket:'ot',      tone:'#ffb020'},
 {k:'callout', lbl:'Ээлжийн амралтаас дуудагдсан',      hrs:true, suf:'д',  bucket:'callout', tone:'#ff7a45'},
 {k:'road',    lbl:'Замын цаг',                        hrs:true, suf:'з',  bucket:'road',    tone:'#1ec8c8'},
 {k:'roadh',   lbl:'Замын цаг (баяр)',                 hrs:true, suf:'зб', bucket:'road',    tone:'#1ec8c8'},
 {k:'leavep',  lbl:'Чөлөө (цалинтай)',                 hrs:true, suf:'ч',  bucket:'leave',   tone:'#8ea2c0'},
 {k:'office',  lbl:'Оффис/томилолт/сургалт (ростерт)', hrs:true, suf:'/о', bucket:'office',  tone:'#7c9cff'},
 {k:'officea', lbl:'Оффис/томилолт/сургалт (амралтаар)',hrs:true, suf:'а',  bucket:'office',  tone:'#7c9cff'},
 {k:'standby', lbl:'Сул зогсолт (цалинтай)',           hrs:false,code:'с', bucket:'standby', tone:'#c0c8d8'},
 {k:'standbyu',lbl:'Сул зогсолт (цалингүй)',           hrs:false,code:'сс',bucket:'standby', tone:'#c0c8d8'},
 {k:'leaveu',  lbl:'Чөлөө (цалингүй)',                 hrs:false,code:'ч', bucket:'other',   tone:'#8ea2c0'},
 {k:'sick',    lbl:'Өвчтэй',                           hrs:false,code:'ө', bucket:'sick',    tone:'#ff4d4f'},
 {k:'shiftl',  lbl:'Ээлжийн амралт',                   hrs:false,code:'эа',bucket:'shiftl',  tone:'#8ea2c0'},
 {k:'rosteroff',lbl:'Ростерын амралт',                 hrs:false,code:'а', bucket:'off',     tone:'#5b6680'},
 {k:'maternity',lbl:'Жирэмсний амралт',                hrs:false,code:'жа',bucket:'other',   tone:'#f472b6'},
 {k:'childcare',lbl:'Хүүхэд асрах чөлөө',              hrs:false,code:'ха',bucket:'other',   tone:'#f472b6'},
];
const ATT2BY=Object.fromEntries(ATT2.map(x=>[x.k,x]));
// Хуучин төлвийг шинэ түлхүүр рүү буулгах (нийцэл)

function downtimeOf(w){if(w.down!=null)return w.down;if(w.start&&w.finish){let m=(new Date(w.finish)-new Date(w.start))/60000;return m>0?Math.round(m):0;}return 0;}
// Минутыг хоног/цаг/мин болгон хүн уншихаар харуулна
function fmtDur(min){min=Math.max(0,Math.round(min||0));if(!min)return '0 мин';const d=Math.floor(min/1440),h=Math.floor((min%1440)/60),m=min%60;const p=[];if(d)p.push(d+' хоног');if(h)p.push(h+' цаг');if(m)p.push(m+' мин');return p.join(' ');}
function downFmt(w){return fmtDur(downtimeOf(w));}
// Гэмтэл засварласан үед — зогсолтын хугацааг цаг/хоногоор оруулж, финиш цаг+downtime авто тооцоолно
function repairFault(w){const startMs=w.start?new Date(w.start).getTime():null;
  const defH=startMs?Math.max(0,(Date.now()-startMs)/3600000).toFixed(1):'';
  const ans=prompt('⚡ Гэмтэл засрах хүртэл нийт хэдэн ЦАГ зарцуулсан бэ?\n(бутархайгаар болно: 1.5 = 1ц 30м · хоногийг ×24, ж: 2 хоног = 48 · 3 хоног = 72)\n\nЭхэлсэн: '+((w.start||'').replace('T',' ')||'—'),defH);
  if(ans===null)return false;const h=parseFloat(String(ans).replace(',','.'));
  if(isNaN(h)||h<0){toast('Хугацаа буруу');return false;}
  w.down=Math.round(h*60);
  w.finish=startMs?new Date(startMs+w.down*60000).toISOString().slice(0,16):new Date().toISOString().slice(0,16);
  return true;}

function kpis(){
  const wos=DB.wos.filter(w=>inRange(w.date)),reps=DB.reports.filter(r=>inRange(r.date));
  const isos=DB.isolations.filter(i=>inRange(i.date)),ens=DB.energy.filter(e=>inRange(e.date));
  const faults=wos.filter(w=>w.fault);
  const totalDown=wos.reduce((s,w)=>s+downtimeOf(w),0),faultDown=faults.reduce((s,w)=>s+downtimeOf(w),0);
  const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  const mttr=faults.length?faultDown/faults.length:0;
  const mtbf=faults.length?(opMin-faultDown)/faults.length/60:0;
  const avail=opMin?Math.max(0,(opMin-faultDown)/opMin*100):100;
  const workHours=reps.reduce((s,r)=>s+(r.head||0)*12,0);
  const done=wos.filter(w=>isClosed(w.status)).length;
  const totFeed=ens.reduce((s,e)=>s+(+e.feed||0),0),totEn=ens.reduce((s,e)=>s+(+e.energy||0),0);
  const byStatus={};STATUSES.forEach(s=>byStatus[s]=wos.filter(w=>w.status===s).length);
  return {total:wos.length,done,planned:wos.filter(w=>isPlanned(w.type)).length,
    unplanned:wos.filter(w=>isUnplanned(w.type)).length,faults:faults.length,activeFaults:wos.filter(isActiveFault).length,byStatus,
    emergency:wos.filter(w=>w.type==='Шуурхай дуудлага').length,
    open:wos.filter(w=>!isClosed(w.status)).length,critical:wos.filter(w=>w.prio==='Эгзэгтэй'&&!isClosed(w.status)).length,
    isoStd:(DB.loto||[]).filter(x=>lotoInRange(x)&&x.type==='Стандарт').length,isoGrp:(DB.loto||[]).filter(x=>lotoInRange(x)&&x.type==='Групп').length,
    down:totalDown,mttr:Math.round(mttr),mtbf:Math.round(mtbf),avail:Math.round(avail*100)/100,workHours,
    completion:wos.length?Math.round(done/wos.length*100):0,unitEnergy:unitEnergy(totEn,totFeed),totFeed,totEn};
}
function workTypeCounts(){const wos=DB.wos.filter(w=>inRange(w.date));const m={};DB.types.forEach(t=>m[t]=0);
  wos.forEach(w=>{m[w.type]=(m[w.type]||0)+1;});return Object.entries(m).filter(([t,c])=>c>0).sort((a,b)=>b[1]-a[1]);}
function trend(){const map={};DB.wos.filter(w=>inRange(w.date)).forEach(w=>{map[w.date]=map[w.date]||{date:w.date,works:0,faults:0,down:0};
  map[w.date].works++;if(w.fault)map[w.date].faults++;map[w.date].down+=downtimeOf(w);});
  return Object.values(map).sort((a,b)=>a.date<b.date?-1:1);}
function energyTrend(){const map={};DB.energy.filter(e=>inRange(e.date)).forEach(e=>{map[e.date]=map[e.date]||{date:e.date,feed:0,energy:0};
  map[e.date].feed+=(+e.feed||0);map[e.date].energy+=(+e.energy||0);});
  return Object.values(map).map(x=>({date:x.date,unit:unitEnergy(x.energy,x.feed)})).sort((a,b)=>a.date<b.date?-1:1);}
function equipReliability(){const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  return DB.equip.map(e=>{const ws=DB.wos.filter(w=>w.equip===e.tag&&inRange(w.date));const faults=ws.filter(w=>w.fault);
    const down=faults.reduce((s,w)=>s+downtimeOf(w),0),stops=faults.length;
    return {tag:e.tag,name:e.name,crit:e.crit,stops,down,mttr:stops?Math.round(down/stops):0,
      mtbf:stops?Math.round((opMin-down)/stops/60):'—',works:ws.length};
  }).sort((a,b)=>b.stops-a.stops||b.down-a.down);}
function topEquip(){const m={};DB.wos.filter(w=>inRange(w.date)&&isActiveFault(w)).forEach(w=>{m[w.equip]=(m[w.equip]||0)+1;});
  return Object.entries(m).map(([tag,c])=>({tag,faults:c})).sort((a,b)=>b.faults-a.faults).slice(0,10);}

function faultHeatmap(){const map={};(DB.wos||[]).filter(w=>w.fault&&inRange(w.date)).forEach(w=>{map[w.date]=(map[w.date]||0)+1;});
  const days=[];let d=new Date(RANGE.from),end=new Date(RANGE.to),g=0;while(d<=end&&g<100){const ds=iso(d);days.push({ds,c:map[ds]||0});d.setDate(d.getDate()+1);g++;}

function rangeLoadPanel(){if(RANGE.from===RANGE.to)return '';const recsAll=DB.attendance||[];const WD=['Ня','Да','Мя','Лх','Пү','Ба','Бя'];

function faultToggle(cb){document.getElementById('faultBox').classList.toggle('hidden',!cb.checked);

  const sl=document.getElementById('startLbl');if(sl)sl.textContent=cb.checked?'⚡ Гэмтэл эхэлсэн цаг (старт) *':'Start time (эхэлсэн)';
  const ws=document.getElementById('w_start');if(cb.checked&&ws&&!ws.value)ws.value=new Date().toISOString().slice(0,16);
  calcDown();}
function calcDown(){const s=val('w_start'),f=val('w_finish');const isF=document.getElementById('w_fault')?.checked;let txt='— (Start/Finish оруулна уу)';
  if(isF&&!f){txt='Засварласан үед хугацаа авто тооцоологдоно';}
  else if(s&&f){let m=Math.max(0,Math.round((new Date(f)-new Date(s))/60000));txt=fmtDur(m);}document.getElementById('downPrev').textContent=txt;}

function saveReport(e){e.preventDefault();const rid=++DB.seq.report;

  if(val('w_desc').trim()){const s=val('w_start'),f=val('w_finish');const isFault=document.getElementById('w_fault').checked;

      desc,fault:isFault,fstate:isFault?'Эвдрэлтэй':'',root:val('w_root'),action:val('w_action'),
      start:(s||(isFault?new Date().toISOString().slice(0,16):'')),finish:f,down:(s&&f)?Math.max(0,Math.round((new Date(f)-new Date(s))/60000)):null,eng:val('w_eng'),photos:(window._newPhotos||[]).slice()});

function importPdAsEquip(){if(!ME||ME.role!=='ADMIN'){toast('Зөвхөн админ');return;}

      const nd=nextDueOf(e),dl=daysUntil(nd);

function reportData(){const k=kpis();const rel=equipReliability();const topStop=rel.find(x=>x.stops>0);
  const reco=[];
  if(k.unplanned>k.planned)reco.push('Төлөвлөгөөт бус ажил төлөвлөгөөтөөс их байна — урьдчилан сэргийлэх (PM) засварыг нэмэгдүүлэхийг зөвлөж байна.');
  if(topStop)reco.push('Хамгийн олон ('+topStop.stops+' удаа) зогссон "'+topStop.tag+'" тоноглолд нарийвчилсан оношилгоо хийхийг зөвлөж байна.');
  if(k.open>0)reco.push(k.open+' нээлттэй ажил байна — хяналтад авч хаахыг анхаарна уу.');
  if(k.avail<98)reco.push('Availability 98%-аас доош байна — зогсолтын шалтгааныг бууруулах шаардлагатай.');
  if(!reco.length)reco.push('Үндсэн үзүүлэлтүүд хэвийн түвшинд байна.');
  const narrative='Тайлант хугацаанд ('+RANGE.from+' — '+RANGE.to+') нийт '+k.total+' ажил бүртгэснээс '+k.done+' нь дууссан (гүйцэтгэл '+k.completion+'%). Үүнээс эвдрэл '+k.faults+', нийт зогсолт '+k.down+' минут. Тоног төхөөрөмжийн бэлэн байдал (Availability) '+k.avail+'%, MTBF '+k.mtbf+' цаг, MTTR '+k.mttr+' минут. Нэгж бүтээгдэхүүнд зарцуулсан эрчим хүч дунджаар '+k.unitEnergy+' кВт/цаг. Тусгаарлалт нийт '+(k.isoStd+k.isoGrp)+' (стандарт '+k.isoStd+', групп '+k.isoGrp+'). Нийт ажилласан хүн-цаг '+k.workHours+'.';
  const byType={};DB.wos.filter(w=>inRange(w.date)).forEach(w=>{(byType[w.type||'Бусад']=byType[w.type||'Бусад']||[]).push(w);});

function importParts(input){const f=input.files&&input.files[0];if(!f)return;
  if(typeof XLSX==='undefined'){toast('Excel сан ачаалагдаагүй — интернэт шалгана уу');return;}
  const rd=new FileReader();
  rd.onload=ev=>{try{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(!DB.parts)DB.parts=[];if(!DB.seq.part)DB.seq.part=0;let added=0;
    arr.forEach((row,i)=>{if(i===0)return;
      let code='',name='',unit='ш',qty=0,min=0;
      if(row.length>=4){code=String(row[0]||'').trim();name=String(row[1]||'').trim();unit=String(row[2]||'ш').trim()||'ш';qty=parseFloat(row[3])||0;min=parseFloat(row[4])||0;}
      else{name=String(row[0]||'').trim();qty=parseFloat(row[1])||0;}
      if(!name)return;
      DB.parts.push({id:++DB.seq.part,code,name,unit,qty,min});added++;});
    save();toast(added+' сэлбэг импортлогдлоо ✓');render();
  }catch(err){toast('Импортын алдаа — файлын форматыг шалгана уу');}};

function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds)-new Date(iso(new Date())))/86400000);}
function insEquipList(){return (DB.equip||[]).filter(e=>+e.insFreq>0).map(e=>{const nd=nextDueOf(e);return Object.assign({},e,{kind:equipKind(e),nextDue:nd,daysLeft:daysUntil(nd),last:lastInspect(e.tag)});});}

function cyr2lat(s){const m={'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'j','з':'z','и':'i','й':'i','к':'k','л':'l','м':'m','н':'n','о':'o','ө':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ү':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sh','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
  return (s||'').toLowerCase().split('').map(c=>m[c]!==undefined?m[c]:(/[a-z0-9]/.test(c)?c:'')).join('').replace(/[^a-z0-9]/g,'');}

function autoRosterForStaff(s){const off={'А':0,'Б':7,'В':14,'Г':21};const o=off[s.shift]||0;let n=0;
  Object.keys(DB.roster||{}).forEach(m=>{const r=DB.roster[m];if(!r||!r.base)return;const bd=new Date(r.base);if(isNaN(bd))return;const nd=monthDays(m);
    if(!r.cells[s.id])r.cells[s.id]={};
    for(let d=1;d<=nd;d++){const ds=m+'-'+String(d).padStart(2,'0');const diff=Math.round((new Date(ds)-bd)/86400000);
      const ph=(((diff-o)%28)+28)%28;const code=ph<7?'Ө':(ph<14?'Ш':'а');r.cells[s.id][ds]=code;n++;
      if(r.confirmed){const rc=RC_BY[code];if(rc){const h=shiftHours(s,rc.k);upsertAtt(s.id,ds,rc.k,h!=null?h:rc.hrs,'');}}}});
  return n;}

function attMonthSummary(m){const map={};(DB.staff||[]).forEach(s=>map[s.id]={base:0,ot:0,night:0,holiday:0,road:0,callout:0,office:0,leaveH:0,standby:0,sick:0,shiftl:0,off:0,other:0,worked:0,dayD:0,nightD:0});

    else if(k==='holiday'){t.holiday+=h;t.worked+=h;}

    else if(k==='road'||k==='roadh'){t.road+=h;}

    else t.other++;});
  return map;}

function normName(s){return (s||'').trim().toLowerCase().replace(/\s+/g,' ');}
function nameTokens(s){return normName(s).split(/\s+/).filter(x=>x.length>2);}
function namesMatch(a,b){if(!a||!b)return false;if(normName(a)===normName(b))return true;const tb=new Set(nameTokens(b));return nameTokens(a).some(t=>tb.has(t));}
function isAssignedToMe(w){if(!ME)return false;const names=(w.assigneeNames&&w.assigneeNames.length)?w.assigneeNames:(w.assignees||[]).map(staffName);return names.some(nm=>namesMatch(ME.name,nm));}

function woKPI(){const map={};(DB.staff||[]).forEach(s=>map[s.id]={name:s.name,role:s.role,shift:s.shift,done:0,onTime:0,minutes:0});
  (DB.naryad||[]).filter(WO_DONE).forEach(w=>{const mins=woWorked(w);
    (w.assignees||[]).forEach(sid=>{const t=map[sid];if(!t)return;t.done++;t.minutes+=mins;
      if(w.plannedFinish&&w.finishedAt&&new Date(w.finishedAt)<=new Date(w.plannedFinish))t.onTime++;});});
  const arr=Object.values(map);const maxDone=Math.max(1,...arr.map(t=>t.done));
  arr.forEach(t=>{t.avg=t.done?Math.round(t.minutes/t.done):0;t.onPct=t.done?Math.round(t.onTime/t.done*100):0;
    const vol=Math.min(1,t.done/maxDone);const speed=t.avg>0?Math.min(1,120/t.avg):0;
    t.score=t.done?Math.round(t.onPct*0.5+vol*100*0.3+speed*100*0.2):0;});
  return map;}

async function checkEscalations(){if(!ME||!['ADMIN','CHIEF','MASTER'].includes(ME.role))return;
  const now=Date.now();let changed=false;
  (DB.wos||[]).forEach(w=>{if(!w.fault||!isActiveFault(w)||w.prio!=='Эгзэгтэй'||w.escalated)return;
    if(!w.start)return;const ageH=(now-new Date(w.start).getTime())/3600000;if(ageH<ESCALATE_H)return;
    w.escalated=true;changed=true;
    const msg='🚨 АНХААР: Эгзэгтэй гэмтэл '+Math.round(ageH)+' цаг засагдаагүй хэвээр!\nТоног: '+(w.equip||w.pd||'—')+'\nТайлбар: '+(w.desc||'')+'\nЭхэлсэн: '+((w.start||'').replace('T',' '));
    notify(msg);pushNotif('*',msg);notifyBrowser('🚨 Эгзэгтэй гэмтэл',(w.equip||'')+' — '+ESCALATE_H+'ц+ засагдаагүй');});
  if(changed)await saveNow();}

function reportWord(){const a=document.getElementById('rptArea');if(!a)return;const html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>'+a.innerHTML+'</body></html>';
  const blob=new Blob(['﻿'+html],{type:'application/msword'});const url=URL.createObjectURL(blob);const el=document.createElement('a');el.href=url;el.download='Tailan_'+RANGE.from+'_'+RANGE.to+'.doc';el.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}
function reportExcel(){const k=kpis();const nar=DB.naryad||[];const ens=DB.energy.filter(e=>inRange(e.date));const te=ens.reduce((s,e)=>s+(+e.energy||0),0),tf=ens.reduce((s,e)=>s+(+e.feed||0),0);
  const rows=[['Үзүүлэлт','Утга'],['Хугацаа',RANGE.from+' - '+RANGE.to],['Нийт ажил',k.total],['Хийгдсэн',k.done],['Идэвхтэй гэмтэл',k.activeFaults],['Нийт гэмтэл',k.faults],['Шуурхай дуудлага',k.emergency],['MTBF цаг',k.mtbf],['MTTR мин',k.mttr],['Downtime мин',k.down],['Availability %',k.avail],['Эрчим хүч кВт/цаг',te],['Тэжээл мян/тн',tf],['WO нээлттэй',nar.filter(w=>!WO_DONE(w)&&w.status!=='Cancelled').length],['WO дууссан',nar.filter(WO_DONE).length],['Тусгаарлалт/LOTO',(DB.loto||[]).length]];
  downloadCSV('Tailan_'+RANGE.from+'_'+RANGE.to,rows);}
/* ---- Өдөр тутмын авто-тайлан ---- */
function dailyReport(d){const inDay=ts=>ts&&String(ts).slice(0,10)===d;
  const woClosed=(DB.naryad||[]).filter(w=>WO_DONE(w)&&inDay(w.finishedAt||w.completedAt)).length;
  const faultsFixed=(DB.wos||[]).filter(w=>w.fault&&!isActiveFault(w)&&inDay(w.finish||w.date)).length;
  const insp=(DB.inspections||[]).filter(i=>i.date===d).length;
  const lotoApplied=(DB.loto||[]).filter(x=>inDay(x.appliedAt)).length;
  const lotoStd=(DB.loto||[]).filter(x=>inDay(x.appliedAt)&&x.type==='Стандарт').length;
  const lotoGrp=(DB.loto||[]).filter(x=>inDay(x.appliedAt)&&x.type==='Групп').length;
  const pm=(DB.wos||[]).filter(w=>isPlanned(w.type)&&isClosed(w.status)&&w.date===d).length;
  const works=(DB.wos||[]).filter(w=>w.date===d).length;
  const inspTags=new Set((DB.inspections||[]).filter(i=>i.date===d).map(i=>i.equip));
  const notInsp=Math.max(0,(DB.equip||[]).length-inspTags.size);
  return {woClosed,faultsFixed,insp,lotoApplied,lotoStd,lotoGrp,pm,works,inspDone:inspTags.size,notInsp};}
function viewDaily(){const d=window._dailyDate||iso(new Date());const r=dailyReport(d);
  return `<div class="glass card" style="margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="section-title" style="margin:0">📅 Өдөр тутмын ажлын тайлан <span class="badge b-ok" style="margin-left:6px">Авто үүсдэг</span></div>
      <input type="date" value="${d}" onchange="window._dailyDate=this.value;render()" style="width:auto">
      <button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="window.print()">🖨️ Хэвлэх/PDF</button></div>
    <div class="grid kpis" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
      ${kpiCard('Хаагдсан Work Order',r.woClosed,'ok')}${kpiCard('Засварласан гэмтэл',r.faultsFixed,'danger')}${kpiCard('Тоног үзлэг',r.insp,'accent')}${kpiCard('PM ажил',r.pm,'teal')}</div>
    <div class="grid kpis" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
      ${kpiCard('LOTO стандарт',r.lotoStd,'warn')}${kpiCard('LOTO групп',r.lotoGrp,'warn')}${kpiCard('Үзлэг хийгдсэн',r.inspDone,'ok','тоног')}${kpiCard('Үзлэг хийгдээгүй',r.notInsp,'danger','үлдсэн тоног')}</div>
    <div class="glass card" id="rptArea"><div class="section-title">📝 Тайлангийн товч (${d})</div>
      <ul style="line-height:2.1;font-size:14px;margin:8px 0">
        <li>Өнөөдөр нийт <b>${r.woClosed}</b> Work Order хаагдсан.</li>
        <li><b>${r.faultsFixed}</b> цахилгааны гэмтэл бүрэн засварлагдсан.</li>
        <li><b>${r.inspDone}</b> тоног төхөөрөмжид үзлэг хийсэн, <b class="t-danger">${r.notInsp}</b> тоног үзлэг хийгдээгүй.</li>
        <li><b>${r.lotoStd}</b> стандарт LOTO, <b>${r.lotoGrp}</b> групп LOTO хийгдсэн.</li>
        <li><b>${r.pm}</b> PM (төлөвлөгөөт) ажил төлөвлөгөөний дагуу биелсэн.</li>
      </ul></div>`;}
function dailySummaryPanel(){const d=iso(new Date());const r=dailyReport(d);
  return `<div class="glass card" style="margin-bottom:16px"><div class="section-title">📅 Өнөөдрийн ажлын товч (авто) <button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="go('daily')">Дэлгэрэнгүй →</button></div>
    <div style="font-size:14px;line-height:2">Хаагдсан WO: <b class="t-ok">${r.woClosed}</b> · Засварласан гэмтэл: <b class="t-danger">${r.faultsFixed}</b> · Үзлэг: <b class="t-accent">${r.inspDone}</b> хийсэн / <b class="t-danger">${r.notInsp}</b> үлдсэн · LOTO: <b>${r.lotoStd}</b> станд / <b>${r.lotoGrp}</b> групп · PM: <b class="t-teal">${r.pm}</b></div></div>`;}
/* ---- Шинэ мэдээ (онцлох мэдээллийн самбар) ---- */
const canPostNews=()=>can('news_post');
const NEWS_CAT=['Онцлох ажил','Аюулгүй ажиллагаа','Шинэ тоног','Сургалт','Шагнал/Урамшуулал','Их засвар','Шуурхай мэдээ'];
function addNews(e){e.preventDefault();if(!canPostNews()){toast('Зөвхөн ахлах/админ нийтэлнэ');return;}if(!DB.news)DB.news=[];if(!DB.seq.news)DB.seq.news=0;
  DB.news.push({id:++DB.seq.news,title:val('nw_title').trim(),body:val('nw_body').trim(),cat:val('nw_cat'),by:ME?ME.name:'',ts:new Date().toISOString().slice(0,16).replace('T',' ')});
  audit('Шинэ мэдээ нийтлэв',val('nw_title').trim());pushNotif('*','📰 Шинэ мэдээ: '+val('nw_title').trim());notify('📰 ШИНЭ МЭДЭЭ\n'+val('nw_title').trim()+'\n'+(ME?ME.name:''));save();toast('Нийтлэгдлээ ✓');render();}
function delNews(id){if(!canDelete()){toast('Зөвхөн админ');return;}if(!confirm('Энэ мэдээг устгах уу?'))return;DB.news=(DB.news||[]).filter(n=>n.id!==id);save();render();}
function viewNews(){const list=(DB.news||[]).slice().reverse();
  return `${canPostNews()?`<div class="glass card" style="margin-bottom:16px"><div class="section-title">📰 Шинэ мэдээ нийтлэх <span class="badge b-accent" style="margin-left:auto">Зөвхөн ахлах инженер / админ</span></div>
    <form onsubmit="addNews(event)"><div class="col3">
      <label class="field" style="grid-column:span 2"><span>Гарчиг *</span><input id="nw_title" required placeholder="ж: Төлөвлөгөөт их засвар эхэллээ"></label>
      <label class="field"><span>Ангилал</span><select id="nw_cat">${optList(NEWS_CAT)}</select></label>
      <label class="field" style="grid-column:span 3"><span>Агуулга</span><textarea id="nw_body" rows="3"></textarea></label>
    </div><div style="margin-top:10px"><button class="btn">Нийтлэх</button></div></form></div>`:'<div class="note" style="margin-bottom:16px">Энд байгууллагын онцлох мэдээ, зарлал харагдана. Нийтлэх эрх зөвхөн ахлах инженер/админд.</div>'}
    <div class="grid col2">${list.map(n=>`<div class="glass card"><div style="display:flex;align-items:start;gap:8px"><div style="flex:1"><span class="badge b-accent" style="font-size:10px">${esc(n.cat||'Мэдээ')}</span> <b style="font-size:15px">${esc(n.title)}</b></div>${canDelete()?delBtn('delNews('+n.id+')'):''}</div>
      ${n.body?'<div style="margin-top:6px;white-space:pre-wrap;font-size:14px">'+esc(n.body)+'</div>':''}
      <div class="muted" style="font-size:11px;margin-top:8px">✍️ ${esc(n.by)} · ${esc(n.ts)}</div></div>`).join('')||'<div class="muted" style="padding:20px">Мэдээ алга.</div>'}</div>`;}
function newsPanel(){const list=(DB.news||[]).slice().reverse().slice(0,3);if(!list.length)return '';
  return `<div class="glass card" style="margin-bottom:16px"><div class="section-title">📰 Шинэ мэдээ <button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="go('news')">Бүгд →</button></div>
    ${list.map(n=>`<div style="padding:7px 0;border-bottom:1px solid var(--line)"><span class="badge b-muted" style="font-size:10px">${esc(n.cat||'')}</span> <b>${esc(n.title)}</b> <span class="muted" style="font-size:11px">· ${esc(n.ts)}</span></div>`).join('')}</div>`;}
function toast(msg){const t=document.createElement('div');t.className='glass toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ============ Auth / эхлүүлэх ============ */
async function doLogin(e){e.preventDefault();
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:val('lu'),password:val('lp')})});
    const d=await r.json();if(!r.ok){toast(d.error||'Алдаа');return;}
    TOKEN=d.token;ME=d.user;localStorage.setItem('tk',TOKEN);await apiLoad();audit('Нэвтэрсэн','');save();startApp();
  }catch(err){toast('Холболтын алдаа — сервер ажиллаж байгаа эсэхийг шалгана уу');}}
function logout(){localStorage.removeItem('tk');TOKEN=null;ME=null;location.reload();}
function startApp(){document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent=ME.name;document.getElementById('whoRole').textContent=roleLabel(ME.role);
  applyTheme();startNotifPoll();
  renderNav();renderPresets();syncDates();render();
  try{const sp=new URLSearchParams(location.search);const eq=sp.get('eq'),pd=sp.get('pd'),wo=sp.get('wo');if(eq){openPassport(eq);}else if(pd){openPdPassport(pd);}else if(wo){go('wo2');setTimeout(()=>{const w=woFind(+wo);if(w)toast('Наряд: '+w.no+' · '+(wo2Label[w.status]||w.status));},300);}}catch(e){}}
async function init(){if(!TOKEN)return;
  try{ME=await api('/api/me',{headers:authHdr()});await apiLoad();startApp();}
  catch{localStorage.removeItem('tk');TOKEN=null;}}
try{applyTheme();}catch(e){}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(ME)openSearch();}if(e.key==='Escape'){closeSearch();const c=document.getElementById('rCtx');if(c)c.remove();}
  if(CUR==='roster'&&(e.ctrlKey||e.metaKey)){if(e.key==='z'||e.key==='Z'){e.preventDefault();rUndo();}if(e.key==='y'||e.key==='Y'){e.preventDefault();rRedo();}}});
document.addEventListener('mouseup',()=>{if(window._rDrag)rPaintEnd();});
document.addEventListener('click',e=>{const c=document.getElementById('rCtx');if(c&&!c.contains(e.target))c.remove();});
init();
</script>
