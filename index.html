<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цахилгааны нэгж · Өдөр тутмын мэдээ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--base:#0b1020;--panel:#121a2e;--panel2:#172139;--line:#243049;
    --accent:#2e8bff;--teal:#1ec8c8;--ok:#2fd07a;--warn:#ffb020;--danger:#ff4d4f;--muted:#8ea2c0;--text:#e6edf7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1200px 600px at 80% -10%,rgba(46,139,255,.08),transparent),
               radial-gradient(900px 500px at -10% 20%,rgba(30,200,200,.06),transparent),var(--base);min-height:100vh}
  .glass{background:linear-gradient(180deg,rgba(23,33,57,.9),rgba(18,26,46,.9));border:1px solid var(--line);border-radius:16px}
  .app{display:flex;min-height:100vh}
  aside{width:240px;flex-shrink:0;border-right:1px solid var(--line);background:rgba(18,26,46,.6);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;gap:10px;align-items:center;padding:16px;border-bottom:1px solid var(--line)}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:rgba(46,139,255,.2);color:var(--accent);display:grid;place-items:center;font-size:20px}
  .brand b{font-size:14px} .brand small{color:var(--muted);font-size:11px;display:block}
  nav{flex:1;overflow:auto;padding:8px}
  nav a{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer}
  nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  nav a.active{background:rgba(46,139,255,.15);color:var(--accent)}
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:10;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:12px 20px;border-bottom:1px solid var(--line);background:rgba(18,26,46,.85);backdrop-filter:blur(8px)}
  header h1{font-size:18px;margin:0}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .content{padding:20px}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  input,select,textarea{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:8px 10px;font-size:14px;width:100%;outline:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(6,1fr)}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)} aside{position:fixed;left:-240px;z-index:50;transition:.2s} aside.open{left:0} .menu-btn{display:block!important} .col3,.col2{grid-template-columns:1fr!important}}
  .card{padding:16px;position:relative;overflow:hidden;animation:rise .35s both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .t-accent{color:var(--accent)} .t-ok{color:var(--ok)} .t-warn{color:var(--warn)}
  .t-danger{color:var(--danger)} .t-teal{color:var(--teal)} .t-muted{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;padding:11px;border-bottom:1px solid var(--line)}
  td{padding:10px 11px;border-bottom:1px solid rgba(36,48,73,.5)}
  tr:hover td{background:rgba(255,255,255,.03)}
  .badge{padding:2px 8px;border-radius:7px;font-size:12px;font-weight:500}
  .b-ok{background:rgba(47,208,122,.15);color:var(--ok)} .b-accent{background:rgba(46,139,255,.15);color:var(--accent)}
  .b-warn{background:rgba(255,176,32,.15);color:var(--warn)} .b-danger{background:rgba(255,77,79,.15);color:var(--danger)}
  .b-teal{background:rgba(30,200,200,.15);color:var(--teal)} .b-muted{background:rgba(255,255,255,.06);color:var(--muted)}
  .btn{background:var(--accent);border:0;color:#fff;border-radius:9px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.08)} .btn-sm{padding:7px 12px;font-size:13px}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--text)}
  .del{background:none;border:0;color:var(--danger);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px}
  .del:hover{background:rgba(255,77,79,.12)}
  .ic{background:none;border:0;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 7px;border-radius:6px}
  .ic:hover{background:rgba(255,255,255,.08);color:#fff}
  .field{display:block} .field span{font-size:12px;color:var(--muted)} .field>div,.field input,.field select,.field textarea{margin-top:5px}
  .section-title{font-size:14px;font-weight:600;margin:0 0 12px;display:flex;gap:8px;align-items:center}
  .menu-btn{display:none;background:none;border:0;color:var(--text);font-size:22px;cursor:pointer}
  .hidden{display:none} .login-wrap{display:grid;place-items:center;min-height:100vh;padding:16px} .muted{color:var(--muted)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .col3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .col2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .note{background:rgba(46,139,255,.08);border:1px solid rgba(46,139,255,.2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted)}
  .toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;font-size:14px;z-index:99;animation:rise .3s}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 14px;font-size:13px}
  .addbar{display:flex;gap:8px;margin-top:6px}
  .tot td{font-weight:700;background:rgba(46,139,255,.06)}
  .toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;flex-wrap:wrap}
  .report-body h2{font-size:15px;margin:18px 0 8px} .report-body p{line-height:1.7;color:var(--text)}
  .report-body ul{margin:6px 0 0 0;padding-left:18px} .report-body li{margin:4px 0;line-height:1.6}
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <form class="glass card" style="width:340px" onsubmit="doLogin(event)">
    <div class="brand" style="border:0;padding:0 0 18px"><div class="logo">⚡</div>
      <div><b>Цахилгааны нэгж</b><small>Өдөр тутмын мэдээ / тайлангийн систем</small></div></div>
    <label class="field"><span>Нэвтрэх нэр</span><input id="lu" autocomplete="username"></label>
    <div style="height:10px"></div>
    <label class="field"><span>Нууц үг</span><input id="lp" type="password" autocomplete="current-password"></label>
    <div style="height:16px"></div><button class="btn" style="width:100%">Нэвтрэх</button>
    <div class="muted" style="font-size:11px;margin-top:14px;line-height:1.6">Хэрэглэгчээ админ үүсгэнэ. Анхны админ: <b>admin / admin123</b></div>
  </form>
</div>

<div id="app" class="app hidden">
  <aside id="side">
    <div class="brand"><div class="logo">⚡</div><div><b>Цахилгааны нэгж</b><small>НБҮГ-ЗТХ · Тайлан</small></div></div>
    <nav id="nav"></nav>
    <div style="padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center">
      <div style="flex:1;min-width:0"><div id="who" style="font-size:13px">—</div><div class="muted" style="font-size:11px" id="whoRole">—</div></div>
      <button class="btn" style="background:none;color:var(--muted);padding:6px" onclick="logout()" title="Гарах">⏻</button>
    </div>
  </aside>
  <main>
    <header>
      <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <span class="dot"></span><h1 id="title">Нүүр</h1>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div class="seg" id="presets"></div>
        <input type="date" id="dFrom" style="width:auto" onchange="setCustom()"><span class="muted">—</span>
        <input type="date" id="dTo" style="width:auto" onchange="setCustom()">
      </div>
    </header>
    <div class="content" id="view"></div>
  </main>
</div>

<script>
/* ============ Серверийн холболт ============ */
let TOKEN=localStorage.getItem('tk')||null, ME=null, DB=null;
const authHdr=()=>({Authorization:'Bearer '+TOKEN});
const jsonHdr=()=>({...authHdr(),'Content-Type':'application/json'});
async function api(path,opts={}){const r=await fetch(path,opts);if(r.status===401){logout();throw new Error('auth');}
  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Алдаа');return d;}
async function apiLoad(){DB=await api('/api/data',{headers:authHdr()});}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{
  fetch('/api/data',{method:'PUT',headers:jsonHdr(),body:JSON.stringify(DB)})
    .then(r=>{if(!r.ok)r.json().then(e=>toast(e.error||'Хадгалах алдаа гарлаа'));});},250);}
function notify(text){fetch('/api/notify',{method:'POST',headers:jsonHdr(),body:JSON.stringify({text})})
  .then(r=>r.json()).then(d=>{if(d&&d.ok)toast('Telegram мэдэгдэл илгээгдлээ ✓');}).catch(()=>{});}

const STATUSES=['Нээлттэй','Хийгдэж буй','Дууссан','Цуцлагдсан'];
const PRIOS=['Бага','Дунд','Өндөр','Эгзэгтэй'];
const ISO_TYPES=['Стандарт','Групп'];
const ISO_STATUS=['Тусгаарласан','Сэргээсэн','Шилжүүлсэн'];
const SHIFT_DN=['Өдөр','Шөнө'];
const ROLES=[['ADMIN','Админ'],['CHIEF','Ахлах инженер'],['EE','Цахилгааны инженер'],['TECH','Техникч'],['VIEWER','Үзэгч']];
const roleLabel=r=>(ROLES.find(x=>x[0]===r)||[r,r])[1];

/* ============ Туслах ============ */
function downtimeOf(w){if(w.down!=null)return w.down;if(w.start&&w.finish){let m=(new Date(w.finish)-new Date(w.start))/60000;return m>0?Math.round(m):0;}return 0;}
function inRange(date){return date>=RANGE.from&&date<=RANGE.to;}
const isPlanned=t=>['Төлөвлөгөөт','PM'].includes(t);
const isUnplanned=t=>['Төлөвлөгөөт бус','CM','Шуурхай дуудлага'].includes(t);
const isClosed=s=>['Дууссан','Цуцлагдсан'].includes(s);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const isoPD=i=>i.pd||i.loto||'';
const isoStatus=i=>i.status||'Тусгаарласан';
const isoShift=i=>i.shift||'—';
const num=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
const unitEnergy=(e,f)=>f>0?Math.round(e/f*100)/100:0;

/* ---- Export туслахууд ---- */
function downloadCSV(name,rows){
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=name+'.csv';document.body.appendChild(a);a.click();a.remove();toast('Excel (CSV) татаж байна ✓');}
function printHTML(title,inner){
  const w=window.open('','_blank');if(!w){toast('Popup-ийг зөвшөөрнө үү (PDF)');return;}
  w.document.write('<!doctype html><html lang="mn"><head><meta charset="utf-8"><title>'+title+'</title>'+
   '<style>body{font-family:Segoe UI,sans-serif;padding:26px;color:#111}h1{font-size:20px;margin:0 0 4px}'+
   'h2{font-size:14px;margin:16px 0 6px}.muted{color:#666;font-size:12px}p{line-height:1.65;font-size:13px}'+
   'ul{padding-left:18px}li{margin:4px 0;font-size:13px}'+
   'table{border-collapse:collapse;width:100%;margin-top:6px}th,td{border:1px solid #aaa;padding:6px 8px;font-size:12px;text-align:left}'+
   'th{background:#eee}</style></head><body>'+inner+
   '<p class="muted" style="margin-top:22px">НБҮГ-ЗТХ Цахилгааны нэгж · Тайлангийн систем · Хэвлэсэн: '+new Date().toLocaleString('mn-MN')+'</p>'+
   '</body></html>');
  w.document.close();w.focus();setTimeout(function(){w.print();},400);}
function exportBar(){return '<div class="toolbar">'+Array.prototype.join.call(arguments,'')+'</div>';}

/* ============ KPI ============ */
function kpis(){
  const wos=DB.wos.filter(w=>inRange(w.date)),reps=DB.reports.filter(r=>inRange(r.date));
  const isos=DB.isolations.filter(i=>inRange(i.date)),ens=DB.energy.filter(e=>inRange(e.date));
  const faults=wos.filter(w=>w.fault);
  const totalDown=wos.reduce((s,w)=>s+downtimeOf(w),0),faultDown=faults.reduce((s,w)=>s+downtimeOf(w),0);
  const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  const mttr=faults.length?faultDown/faults.length:0;
  const mtbf=faults.length?(opMin-faultDown)/faults.length/60:0;
  const avail=opMin?Math.max(0,(opMin-faultDown)/opMin*100):100;
  const workHours=reps.reduce((s,r)=>s+(r.head||0)*12,0);
  const done=wos.filter(w=>isClosed(w.status)).length;
  const totFeed=ens.reduce((s,e)=>s+(+e.feed||0),0),totEn=ens.reduce((s,e)=>s+(+e.energy||0),0);
  return {total:wos.length,done,planned:wos.filter(w=>isPlanned(w.type)).length,
    unplanned:wos.filter(w=>isUnplanned(w.type)).length,faults:faults.length,
    open:wos.filter(w=>!isClosed(w.status)).length,critical:wos.filter(w=>w.prio==='Эгзэгтэй'&&!isClosed(w.status)).length,
    isoStd:isos.filter(i=>i.type==='Стандарт').length,isoGrp:isos.filter(i=>i.type==='Групп').length,
    down:totalDown,mttr:Math.round(mttr),mtbf:Math.round(mtbf),avail:Math.round(avail*100)/100,workHours,
    completion:wos.length?Math.round(done/wos.length*100):0,unitEnergy:unitEnergy(totEn,totFeed),totFeed,totEn};
}
function workTypeCounts(){const wos=DB.wos.filter(w=>inRange(w.date));const m={};DB.types.forEach(t=>m[t]=0);
  wos.forEach(w=>{m[w.type]=(m[w.type]||0)+1;});return Object.entries(m).filter(([t,c])=>c>0).sort((a,b)=>b[1]-a[1]);}
function trend(){const map={};DB.wos.filter(w=>inRange(w.date)).forEach(w=>{map[w.date]=map[w.date]||{date:w.date,works:0,faults:0,down:0};
  map[w.date].works++;if(w.fault)map[w.date].faults++;map[w.date].down+=downtimeOf(w);});
  return Object.values(map).sort((a,b)=>a.date<b.date?-1:1);}
function energyTrend(){const map={};DB.energy.filter(e=>inRange(e.date)).forEach(e=>{map[e.date]=map[e.date]||{date:e.date,feed:0,energy:0};
  map[e.date].feed+=(+e.feed||0);map[e.date].energy+=(+e.energy||0);});
  return Object.values(map).map(x=>({date:x.date,unit:unitEnergy(x.energy,x.feed)})).sort((a,b)=>a.date<b.date?-1:1);}
function equipReliability(){const days=Math.max(1,(new Date(RANGE.to)-new Date(RANGE.from))/86400000+1),opMin=days*24*60;
  return DB.equip.map(e=>{const ws=DB.wos.filter(w=>w.equip===e.tag&&inRange(w.date));const faults=ws.filter(w=>w.fault);
    const down=faults.reduce((s,w)=>s+downtimeOf(w),0),stops=faults.length;
    return {tag:e.tag,name:e.name,crit:e.crit,stops,down,mttr:stops?Math.round(down/stops):0,
      mtbf:stops?Math.round((opMin-down)/stops/60):'—',works:ws.length};
  }).sort((a,b)=>b.stops-a.stops||b.down-a.down);}
function topEquip(){const m={};DB.wos.filter(w=>inRange(w.date)&&w.fault).forEach(w=>{m[w.equip]=(m[w.equip]||0)+1;});
  return Object.entries(m).map(([tag,c])=>({tag,faults:c})).sort((a,b)=>b.faults-a.faults).slice(0,10);}

/* ============ Огнооны муж ============ */
const iso=d=>d.toISOString().slice(0,10);
function presetRange(p){const now=new Date();const to=iso(now);
  if(p==='today')return{from:to,to};
  if(p==='week'){const f=new Date(now);f.setDate(f.getDate()-6);return{from:iso(f),to};}
  if(p==='year')return{from:now.getFullYear()+'-01-01',to};
  return{from:to.slice(0,8)+'01',to};}
let PRESET='custom',RANGE={from:'2026-06-01',to:'2026-06-30'};
function setPreset(p){PRESET=p;RANGE=presetRange(p);syncDates();renderPresets();render();}
function setCustom(){PRESET='custom';RANGE={from:document.getElementById('dFrom').value,to:document.getElementById('dTo').value};renderPresets();render();}
function syncDates(){document.getElementById('dFrom').value=RANGE.from;document.getElementById('dTo').value=RANGE.to;}
function renderPresets(){const ps=[['today','Өдөр'],['week','7 хоног'],['month','Сар'],['year','Он']];
  document.getElementById('presets').innerHTML=ps.map(([k,l])=>`<button class="${PRESET===k?'on':''}" onclick="setPreset('${k}')">${l}</button>`).join('');}

/* ============ Навигаци ============ */
const BASE_PAGES=[
  ['dash','Нүүр / Dashboard','📊'],['new','Шинэ мэдээ оруулах','➕'],
  ['energy','Эрчим хүчний хэрэглээ','🔋'],['work','Ажлын түүх / Хайлт','📋'],
  ['iso','Тусгаарлалт / PD','🔒'],['equip','Тоног төхөөрөмж','📦'],
  ['reliab','Найдвартай ажиллагаа','📈'],['report','Тайлан / Дүгнэлт','📅'],
  ['eng','Инженерийн гүйцэтгэл','👤'],['faults','Цахилгааны гэмтэл','⚡'],['ref','Лавлах / Тохиргоо','⚙️'],
];
function pages(){const p=[...BASE_PAGES];if(ME&&ME.role==='ADMIN')p.push(['users','Хэрэглэгчид (Админ)','👥']);return p;}
let CUR='dash';
function go(p){CUR=p;document.getElementById('side').classList.remove('open');renderNav();render();}
function renderNav(){document.getElementById('nav').innerHTML=pages().map(([k,l,ic])=>
  `<a class="${CUR===k?'active':''}" onclick="go('${k}')">${ic} ${l}</a>`).join('');
  document.getElementById('title').textContent=(pages().find(p=>p[0]===CUR)||['','Нүүр'])[1];}

/* ============ Render ============ */
function render(){const v=document.getElementById('view');
  if(CUR==='dash'){v.innerHTML=viewDash();drawCharts();}
  else if(CUR==='new')v.innerHTML=viewNew();
  else if(CUR==='energy'){v.innerHTML=viewEnergy();drawEnergyChart();}
  else if(CUR==='work'){v.innerHTML=viewWork();renderWorkTable();}
  else if(CUR==='iso'){v.innerHTML=viewIso();drawIsoCharts();}
  else if(CUR==='equip')v.innerHTML=viewEquip();
  else if(CUR==='reliab')v.innerHTML=viewReliab();
  else if(CUR==='report')v.innerHTML=viewReport();
  else if(CUR==='eng')v.innerHTML=viewEng();
  else if(CUR==='faults')v.innerHTML=viewFaults();
  else if(CUR==='ref')v.innerHTML=viewRef();
  else if(CUR==='users'){v.innerHTML=viewUsers();loadUsers();}
}
function kpiCard(lbl,val,tone,sub){return `<div class="glass card kpi"><div class="lbl">${lbl}</div>
  <div class="val t-${tone}">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;}
function optList(arr,sel){return arr.map(x=>`<option ${x===sel?'selected':''}>${esc(x)}</option>`).join('');}
function dataListEquip(){return `<datalist id="equipList">${DB.equip.map(e=>`<option value="${esc(e.tag)}">`).join('')}</datalist>`;}

/* ---- Dashboard ---- */
function viewDash(){const k=kpis();
  return `<div class="grid kpis" style="margin-bottom:12px">
    ${kpiCard('Нийт ажил',k.total,'accent')}${kpiCard('Хийгдсэн',k.done,'ok')}

function reportData(){const k=kpis();const rel=equipReliability();const topStop=rel.find(x=>x.stops>0);
  const reco=[];
  if(k.unplanned>k.planned)reco.push('Төлөвлөгөөт бус ажил төлөвлөгөөтөөс их байна — урьдчилан сэргийлэх (PM) засварыг нэмэгдүүлэхийг зөвлөж байна.');
  if(topStop)reco.push('Хамгийн олон ('+topStop.stops+' удаа) зогссон "'+topStop.tag+'" тоноглолд нарийвчилсан оношилгоо хийхийг зөвлөж байна.');
  if(k.open>0)reco.push(k.open+' нээлттэй ажил байна — хяналтад авч хаахыг анхаарна уу.');
  if(k.avail<98)reco.push('Availability 98%-аас доош байна — зогсолтын шалтгааныг бууруулах шаардлагатай.');
  if(!reco.length)reco.push('Үндсэн үзүүлэлтүүд хэвийн түвшинд байна.');
  const narrative='Тайлант хугацаанд ('+RANGE.from+' — '+RANGE.to+') нийт '+k.total+' ажил бүртгэснээс '+k.done+' нь дууссан (гүйцэтгэл '+k.completion+'%). Үүнээс эвдрэл '+k.faults+', нийт зогсолт '+k.down+' минут. Тоног төхөөрөмжийн бэлэн байдал (Availability) '+k.avail+'%, MTBF '+k.mtbf+' цаг, MTTR '+k.mttr+' минут. Нэгж бүтээгдэхүүнд зарцуулсан эрчим хүч дунджаар '+k.unitEnergy+' кВт/цаг. Тусгаарлалт нийт '+(k.isoStd+k.isoGrp)+' (стандарт '+k.isoStd+', групп '+k.isoGrp+'). Нийт ажилласан хүн-цаг '+k.workHours+'.';

        <button class="ic" title="Нууц үг солих" onclick="editUserPw(${u.id},'${esc(u.username)}')">🔑</button>
        <button class="ic" title="Эрх солих" onclick="editUserRole(${u.id},'${esc(u.username)}','${u.role}')">⚙️</button>
        ${u.id===ME.id?'<span class="muted" style="font-size:12px;margin-left:4px">(та)</span>':`<button class="del" title="Устгах" onclick="delUser(${u.id},'${esc(u.username)}')">✕</button>`}
      </td></tr>`).join('')}</tbody>`;
  }catch(e){toast(e.message);}}
async function addUser(e){e.preventDefault();
  try{await api('/api/users',{method:'POST',headers:jsonHdr(),body:JSON.stringify({
      username:val('u_username').trim(),name:val('u_name').trim(),password:val('u_pw'),role:val('u_role')})});
    toast('Хэрэглэгч нэмэгдлээ ✓');render();}catch(err){toast(err.message);}}
async function editUserPw(id,name){const pw=prompt('"'+name+'" хэрэглэгчийн ШИНЭ нууц үг оруулна уу:');
  if(!pw||!pw.trim())return;
  try{await api('/api/users/'+id,{method:'PUT',headers:jsonHdr(),body:JSON.stringify({password:pw.trim()})});toast('Нууц үг солигдлоо ✓');}
  catch(err){toast(err.message);}}
async function editUserRole(id,name,cur){
  const list=ROLES.map((r,i)=>(i+1)+'='+r[1]).join(', ');
  const ans=prompt('"'+name+'" -ийн эрхийг сонгоно уу:\n'+list+'\n(одоо: '+roleLabel(cur)+')');
  if(!ans)return;const idx=parseInt(ans,10)-1;if(isNaN(idx)||!ROLES[idx]){toast('Буруу сонголт');return;}
  try{await api('/api/users/'+id,{method:'PUT',headers:jsonHdr(),body:JSON.stringify({role:ROLES[idx][0]})});toast('Эрх солигдлоо ✓');render();}
  catch(err){toast(err.message);}}
async function delUser(id,name){if(!confirm(name+' хэрэглэгчийг устгах уу?'))return;
  try{await api('/api/users/'+id,{method:'DELETE',headers:authHdr()});toast('Устгагдлаа');render();}catch(err){toast(err.message);}}

function toast(msg){const t=document.createElement('div');t.className='glass toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}

/* ============ Auth / эхлүүлэх ============ */
async function doLogin(e){e.preventDefault();
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:val('lu'),password:val('lp')})});
    const d=await r.json();if(!r.ok){toast(d.error||'Алдаа');return;}
    TOKEN=d.token;ME=d.user;localStorage.setItem('tk',TOKEN);await apiLoad();startApp();
  }catch(err){toast('Холболтын алдаа — сервер ажиллаж байгаа эсэхийг шалгана уу');}}
function logout(){localStorage.removeItem('tk');TOKEN=null;ME=null;location.reload();}
function startApp(){document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent=ME.name;document.getElementById('whoRole').textContent=roleLabel(ME.role);
  renderNav();renderPresets();syncDates();render();}
async function init(){if(!TOKEN)return;
  try{ME=await api('/api/me',{headers:authHdr()});await apiLoad();startApp();}
  catch{localStorage.removeItem('tk');TOKEN=null;}}
init();
</script>
